);\n    try{t2c=await gtj(CLG_T2_COLS_KEY);}catch(e){}\n    if(!t2c||!t2c.length){try{t2c=JSON.parse(localStorage.getItem(CLG_T2_COLS_KEY));}catch(e){}}\n    clgT2Cols=clgReconcileCols(migrateCols(t2c,CLG_T2_FIXED,clgT2),clgT2,[[\"recebeu\",\"Recebeu\",\"local\"]]);\n    try{c=await gtj(CLG_CARDS_KEY);}catch(e){}\n    if(!c||!c.length){try{c=JSON.parse(localStorage.getItem(CLG_CARDS_KEY));}catch(e){}}\n    clgCards=(c&&c.length)?c:[];\n    clgCards.forEach(function(cd){cd.items=cd.items.map(function(it){return it.vals?it:{k:it.k,vals:[it.v!==undefined?it.v:\"\"]};});});\n    var t3n=null,t3e=null;\n    try{t3n=await gtj(CLG_T3NAV_KEY);}catch(e){}\n    clgT3Nav=(t3n&&t3n.length)?t3n:clgT3SeedFor(CLG_T3_NAV_ROSTER);\n    try{t3e=await gtj(CLG_T3EMB_KEY);}catch(e){}\n    clgT3Emb=(t3e&&t3e.length)?t3e:clgT3SeedFor(CLG_T3_EMB_ROSTER);\n    clgSaveT1();clgSaveT2();clgSaveCards();clgSaveT1Cols();clgSaveT2Cols();clgSaveT3Nav();clgSaveT3Emb();\n  }\n  function clgSaveT1(){try{localStorage.setItem(CLG_T1_KEY,JSON.stringify(clgT1));}catch(e){}}\n  function clgSaveT2(){try{localStorage.setItem(CLG_T2_KEY,JSON.stringify(clgT2));}catch(e){}}\n  function clgSaveT1Cols(){try{localStorage.setItem(CLG_T1_COLS_KEY,JSON.stringify(clgT1Cols));}catch(e){}}\n  function clgSaveT2Cols(){try{localStorage.setItem(CLG_T2_COLS_KEY,JSON.stringify(clgT2Cols));}catch(e){}}\n  function clgSaveCards(){try{localStorage.setItem(CLG_CARDS_KEY,JSON.stringify(clgCards));}catch(e){}}\n  function clgSaveT3Nav(){try{localStorage.setItem(CLG_T3NAV_KEY,JSON.stringify(clgT3Nav));}catch(e){}}\n  function clgSaveT3Emb(){try{localStorage.setItem(CLG_T3EMB_KEY,JSON.stringify(clgT3Emb));}catch(e){}}\n  function clgUpdateToolbar(prefix,editing,dirty,lockedByOther){\n    var editBtn=document.getElementById(prefix+\"_edit\");\n    var actions=document.getElementById(prefix+\"_edit_actions\");\n    var saveBtn=document.getElementById(prefix+\"_save\");\n    if(!editBtn)return;\n    if(editing){\n      editBtn.hidden=true;actions.hidden=false;\n      saveBtn.disabled=!dirty;\n    }else{\n      editBtn.hidden=false;actions.hidden=true;\n      editBtn.disabled=!!lockedByOther;\n    }\n  }\n  /* \u2500\u2500 Hist\u00f3rico de estoque (uma leitura por meio/dia, s\u00f3 quando muda) \u2192 gr\u00e1fico de evolu\u00e7\u00e3o 6 meses \u2500\u2500 */\n  var CLG_HIST_KEY=\"aa_clg_estoque_hist_v1\";\n  var clgHist={};\n  async function clgLoadHist(){\n    var h=null;\n    try{h=await gtj(CLG_HIST_KEY);}catch(e){}\n    if(!h){try{h=JSON.parse(localStorage.getItem(CLG_HIST_KEY));}catch(e){}}\n    clgHist=h||{};\n  }\n  function clgSaveHist(){\n    try{localStorage.setItem(CLG_HIST_KEY,JSON.stringify(clgHist));}catch(e){}\n    pushKV(\"clgPush\",CLG_HIST_KEY,clgHist);\n  }\n  function clgLogEstoque(){\n    var day=new Date();day.setHours(0,0,0,0);\n    var t=day.getTime(),changed=false;\n    clgT1.forEach(function(r){\n      var v=clgNum(r.estoque);\n      if(isNaN(v))return;\n      var arr=clgHist[r.id]||(clgHist[r.id]=[]);\n      var last=arr[arr.length-1];\n      if(last&&last.t===t){if(last.v!==v){last.v=v;changed=true;}return;}\n      if(last&&last.v===v)return;\n      arr.push({t:t,v:v});changed=true;\n      if(arr.length>200)arr.splice(0,arr.length-200);\n    });\n    if(changed)clgSaveHist();\n  }\n  function clgRenderChart(){\n    var sel=document.getElementById(\"clg_chart_meio\"),box=document.getElementById(\"clg_chart\");\n    if(!sel||!box)return;\n    if(sel.options.length<=1){\n      sel.innerHTML='<option value=\"\">Todos os meios</option>'+clgT1.map(function(r){return '<option value=\"'+r.id+'\">'+esc(r.meio||\"\u2014\")+'</option>';}).join(\"\");\n      sel.onchange=clgRenderChart;\n    }\n    var cutoff=new Date(new Date().getFullYear(),0,1); // ano corrente inteiro\n    // Bolinhas s\u00f3 nas datas de lan\u00e7amento (consumo/abastecimento), extra\u00eddas da auditoria;\n    // os pontos intermedi\u00e1rios (consumo di\u00e1rio distribu\u00eddo, leituras autom\u00e1ticas) viram s\u00f3 linha.\n    // lancDates guarda o lan\u00e7amento COMPLETO (n\u00e3o s\u00f3 um flag) \u2014 vira o detalhe clic\u00e1vel do ponto.\n    var lancDates={},consumoPeriods={};\n    auditLog.forEach(function(e){\n      var l=clgParseLanc(e);\n      if(!l||l.e.scope!==\"clg_t1\")return;\n      var t=new Date(l.data.split(\"/\").reverse().join(\"-\")+\"T00:00:00\").getTime();\n      (lancDates[l.e.rowId]||(lancDates[l.e.rowId]={}))[t]=l;\n      if(l.kind===\"consumo\")(consumoPeriods[l.e.rowId]||(consumoPeriods[l.e.rowId]=[])).push({start:t-(l.dias-1)*86400000,end:t});\n    });\n    var rows=sel.value?clgT1.filter(function(r){return r.id===sel.value;}):clgT1;\n    var series=rows.map(function(r){\n      var marks=lancDates[r.id]||{};\n      var pts=(clgHist[r.id]||[]).filter(function(p){return p.t>=cutoff.getTime();}).map(function(p){\n        var l=marks[p.t],meta=null;\n        if(l){\n          if(l.kind===\"consumo\"){\n            var startT=p.t-(l.dias-1)*86400000;\n            meta={title:r.meio||\"\u2014\",tag:\"Consumo de ODM\",tagColor:\"var(--c-red)\",\n              rows:[\n                [\"Tipo de consumo\",(l.tipoConsumo||\"\").replace(/^\\w/,function(c){return c.toUpperCase();})],\n                [\"Per\u00edodo da comiss\u00e3o\",lchartFmtLong(startT)+\" \u2192 \"+lchartFmtLong(p.t)],\n                [\"Dias de comiss\u00e3o\",l.dias+\" dia(s)\"],\n                [\"Quantidade consumida\",\"\u2212\"+Math.round(l.qtd).toLocaleString(\"pt-BR\")+\" L\"],\n                [\"M\u00e9dia em comiss\u00e3o\",Math.round(l.qtd/l.dias).toLocaleString(\"pt-BR\")+\" L/dia\"],\n                [\"Estoque antes\",Math.round(p.v+l.qtd).toLocaleString(\"pt-BR\")+\" L\"],\n                [\"Estoque ap\u00f3s\",Math.round(p.v).toLocaleString(\"pt-BR\")+\" L\"]\n              ]};\n          }else{\n            meta={title:r.meio||\"\u2014\",tag:\"Abastecimento de ODM\",tagColor:\"var(--c-teal)\",\n              rows:[\n                [\"Data\",lchartFmtLong(p.t)],\n                [\"Quantidade recebida\",\"+\"+Math.round(l.qtd).toLocaleString(\"pt-BR\")+\" L\"],\n                [\"Estoque antes\",Math.round(p.v-l.qtd).toLocaleString(\"pt-BR\")+\" L\"],\n                [\"Estoque ap\u00f3s\",Math.round(p.v).toLocaleString(\"pt-BR\")+\" L\"]\n              ]};\n          }\n        }\n        return{t:p.t,v:p.v,dot:!!l,meta:meta};\n      });\n      // Ponto-\u00e2ncora na v\u00e9spera do in\u00edcio de cada comiss\u00e3o: sem ele, a linha interpola direto do\n      // \u00faltimo ponto anterior at\u00e9 o 1\u00ba dia do per\u00edodo e o gr\u00e1fico \"desce antes\" da comiss\u00e3o come\u00e7ar.\n      // O \u00e2ncora segura o valor plano at\u00e9 a v\u00e9spera; s\u00f3 entra se n\u00e3o houver ponto naquele intervalo.\n      pts.sort(function(a,b){return a.t-b.t;});\n      (consumoPeriods[r.id]||[]).forEach(function(per){\n        var anchorT=per.start-86400000;\n        if(anchorT<cutoff.getTime())return;\n        if(pts.some(function(p){return p.t>=anchorT&&p.t<per.start;}))return;\n        var prev=null;\n        pts.forEach(function(p){if(p.t<anchorT&&(!prev||p.t>prev.t))prev=p;});\n        if(prev)pts.push({t:anchorT,v:prev.v,dot:false});\n      });\n      pts.sort(function(a,b){return a.t-b.t;});\n      return{name:r.meio||\"\u2014\",points:pts};\n    }).filter(function(x){return x.points.length;});\n    svgLineChart(box,series,{height:330,yMin0:true,markedDotsOnly:true,fmtY:function(v){return v.toLocaleString(\"pt-BR\");},fmtVal:function(v){return v.toLocaleString(\"pt-BR\")+\" L\";}});\n  }\n  /* \u2500\u2500 Previs\u00e3o de dura\u00e7\u00e3o do estoque por meio, a partir do consumo m\u00e9dio di\u00e1rio registrado no hist\u00f3rico \u2500\u2500 */\n  // Autonomia operativa: m\u00e9dia de consumo di\u00e1rio EM COMISS\u00c3O = soma dos consumos OPERATIVOS\n  // lan\u00e7ados \u00f7 soma dos dias de comiss\u00e3o desses lan\u00e7amentos. Consumo administrativo fica de fora\n  // (a previs\u00e3o \u00e9 de dias de comiss\u00e3o) e abastecimento n\u00e3o entra na m\u00e9dia \u2014 ele s\u00f3 aumenta o\n  // estoque atual, que \u00e9 o numerador da proje\u00e7\u00e3o (mais combust\u00edvel = mais dias navegando).\n  function clgPrevisaoFor(r){\n    var totalQtd=0,totalDias=0;\n    auditLog.forEach(function(e){\n      var l=clgParseLanc(e);\n      if(!l||l.e.scope!==\"clg_t1\"||l.e.rowId!==r.id)return;\n      if(l.kind!==\"consumo\"||String(l.tipoConsumo).toLowerCase()!==\"operativo\")return;\n      totalQtd+=l.qtd;totalDias+=l.dias;\n    });\n    if(totalDias<=0||totalQtd<=0)return null;\n    var consumoDiario=totalQtd/totalDias;\n    var estAtual=clgNum(r.estoque);\n    if(isNaN(estAtual))return null;\n    return{dias:Math.max(0,Math.round(estAtual/consumoDiario)),media:consumoDiario};\n  }\n  function clgRenderPrevisao(){\n    var el=document.getElementById(\"clg_previsao\");\n    if(!el)return;\n    if(!clgT1.length){el.innerHTML='<div style=\"font-size:11px;color:var(--text3);font-style:italic\">Nenhum meio cadastrado no Estoque de ODM.</div>';return;}\n    // Navios na primeira linha da grade e AvB na segunda (grade de 4 colunas fixas \u2014 os 2 AvB\n    // ocupam as 2 primeiras c\u00e9lulas da linha de baixo, todos os cart\u00f5es do mesmo tamanho).\n    var ordenado=clgT1.slice().sort(function(a,b){\n      var aAvb=/\\bavb\\b/i.test(a.meio||\"\")?1:0,bAvb=/\\bavb\\b/i.test(b.meio||\"\")?1:0;\n      return aAvb-bAvb;\n    });\n    el.innerHTML=ordenado.map(function(r){\n      var p=clgPrevisaoFor(r);\n      var dias=p?p.dias:null;\n      var txt=p===null?\"Dados insuficientes (\u00e9 preciso registrar ao menos 1 consumo operativo com os dias de comiss\u00e3o)\":(\"Com o estoque atual, a autonomia prevista \u00e9 de <b>\"+dias+\" dias</b> de comiss\u00e3o - m\u00e9dia de \"+Math.round(p.media).toLocaleString(\"pt-BR\")+\"/dia em comiss\u00e3o.\");\n      var cls=dias!==null&&dias<=15?\"var(--c-red)\":(dias!==null&&dias<=30?\"#b96a10\":\"var(--text2)\");\n      return '<div class=\"stats-card'+(p?\" clg-prev-clickable\":\"\")+'\" data-rid=\"'+r.id+'\"><h4>'+esc(r.meio||\"\u2014\")+'</h4><div style=\"font-size:12.5px;color:'+cls+'\">'+txt+'</div></div>';\n    }).join(\"\");\n    el.querySelectorAll(\".clg-prev-clickable\").forEach(function(card){\n      card.onclick=function(){\n        var row=clgT1.find(function(x){return x.id===card.dataset.rid;});\n        if(row)clgOpenPrevisaoMemoria(row);\n      };\n    });\n  }\n  // Mem\u00f3ria de c\u00e1lculo da autonomia: lista cada consumo operativo usado na m\u00e9dia (evento PMPE,\n  // dias de comiss\u00e3o, quantidade) e o total/divis\u00e3o que gera a m\u00e9dia di\u00e1ria mostrada no cart\u00e3o.\n  function clgOpenPrevisaoMemoria(r){\n    var bg=ensureModal(\"clgPrevMemBg\",\"Mem\u00f3ria de c\u00e1lculo \u2014 \"+(r.meio||\"\u2014\"));\n    var body=bg.querySelector(\".mbody\");\n    var lancs=[];\n    auditLog.forEach(function(e){\n      var l=clgParseLanc(e);\n      if(!l||l.e.scope!==\"clg_t1\"||l.e.rowId!==r.id)return;\n      if(l.kind!==\"consumo\"||String(l.tipoConsumo).toLowerCase()!==\"operativo\")return;\n      lancs.push(l);\n    });\n    var totalQtd=lancs.reduce(function(s,l){return s+l.qtd;},0);\n    var totalDias=lancs.reduce(function(s,l){return s+l.dias;},0);\n    if(!lancs.length){\n      body.innerHTML='<div style=\"font-size:12px;color:var(--text3);font-style:italic\">Nenhum consumo operativo registrado ainda para este meio.</div>';\n    }else{\n      body.innerHTML='<div style=\"font-size:11px;color:var(--text3);margin-bottom:8px\">Cada linha \u00e9 um consumo operativo lan\u00e7ado (evento PMPE informado no lan\u00e7amento) \u2014 a soma das quantidades \u00f7 soma dos dias de comiss\u00e3o gera a m\u00e9dia di\u00e1ria.</div>'+\n        lancs.map(function(l){\n          var mm=/^PMPE (.*?) \u00b7 ([\\s\\S]*)$/.exec(l.extra||\"\");\n          var evento=mm?mm[1]:\"\u2014\",desc=mm?mm[2]:\"\";\n          return '<div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--border);border-radius:var(--r-md);padding:8px 12px;margin-bottom:6px\">'+\n            '<div><b style=\"font-size:12.5px\">PMPE '+esc(evento)+'</b>'+(desc?' <span style=\"font-size:11.5px;color:var(--text2)\">\u00b7 '+esc(desc)+'</span>':'')+\n            '<div style=\"font-size:11px;color:var(--text3)\">'+esc(l.data)+' \u00b7 '+l.dias+' dia(s) de comiss\u00e3o</div></div>'+\n            '<div style=\"font-size:12.5px;font-weight:700;white-space:nowrap\">'+l.qtd.toLocaleString(\"pt-BR\")+' L</div>'+\n          '</div>';\n        }).join(\"\")+\n        '<div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;border-top:1px solid var(--border);padding-top:8px;margin-top:4px\">'+\n          '<span>Consumo total</span><span>'+totalQtd.toLocaleString(\"pt-BR\")+' L</span></div>'+\n        '<div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:700\"><span>Dias totais de comiss\u00e3o</span><span>'+totalDias+' dia(s)</span></div>'+\n        '<div style=\"display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--c-blue)\"><span>M\u00e9dia ('+totalQtd.toLocaleString(\"pt-BR\")+' \u00f7 '+totalDias+')</span><span>'+Math.round(totalQtd/totalDias).toLocaleString(\"pt-BR\")+' L/dia</span></div>';\n    }\n    bg.classList.add(\"open\");\n  }\n  /* \u2500\u2500 Inserir consumo (ODM ou Gasolina/Lubrificantes/Graxas): abate direto do estoque do meio,\n     sem precisar editar a tabela \u2014 mesmo padr\u00e3o de \"Inserir altera\u00e7\u00e3o\" do CONDEF. Consumo de ODM\n     passa por clgLogEstoque() logo em seguida, ent\u00e3o o gr\u00e1fico de evolu\u00e7\u00e3o (que l\u00ea clgHist) j\u00e1\n     reflete o novo valor automaticamente, igual a uma edi\u00e7\u00e3o manual da c\u00e9lula Estoque. \u2500\u2500 */\n  // Normaliza nome de meio (sem acento, min\u00fasculo, espa\u00e7os colapsados) pra casar o mesmo navio\n  // mesmo quando foi digitado de forma levemente diferente no Estoque de ODM e no Gasolina/\n  // Lubrificantes/Graxas (ex.: acentua\u00e7\u00e3o ou mai\u00fasculas diferentes) \u2014 sem isso, o mesmo navio\n  // aparecia duas vezes na lista de sele\u00e7\u00e3o em vez de uma \u00fanica entrada com as duas op\u00e7\u00f5es.\n  function clgNorm(s){return String(s||\"\").normalize(\"NFD\").replace(/[\\u0300-\\u036f]/g,\"\").toLowerCase().replace(/\\s+/g,\" \").trim();}\n  function clgAllMeios(){\n    var canon={};\n    (typeof navGetState===\"function\"?navGetState().ships:[]).forEach(function(s){if(s.nome)canon[clgNorm(s.nome)]=s.nome;});\n    var seen={};\n    function add(raw){\n      if(!raw)return;\n      var n=clgNorm(raw);\n      if(!seen[n])seen[n]=canon[n]||raw;\n    }\n    clgT1.forEach(function(r){add(r.meio);});\n    clgT3Nav.concat(clgT3Emb).forEach(function(r){add(r.meio);});\n    var names=Object.keys(seen).map(function(n){return seen[n];});\n    // Ordena pela mesma ordem de apresenta\u00e7\u00e3o da tabela de Condi\u00e7\u00e3o de Efici\u00eancia dos Meios\n    // (CONDEF) \u2014 n\u00e3o alfab\u00e9tica. Nomes que n\u00e3o constam l\u00e1 (ex.: s\u00f3 cadastrados aqui em CLG) ficam\n    // ao final, na ordem em que foram encontrados.\n    var order=(typeof navGetState===\"function\"?navGetState().ships:[]).map(function(s){return s.nome;});\n    return names.slice().sort(function(a,b){\n      var ia=order.indexOf(a),ib=order.indexOf(b);\n      if(ia<0&&ib<0)return 0;\n      if(ia<0)return 1;\n      if(ib<0)return -1;\n      return ia-ib;\n    });\n  }\n  function clgHasOdm(nome){var n=clgNorm(nome);return clgT1.some(function(r){return clgNorm(r.meio)===n;});}\n  function clgHasGlg(nome){var n=clgNorm(nome);return clgT3Nav.concat(clgT3Emb).some(function(r){return clgNorm(r.meio)===n;});}\n  function clgFindByNome(arr,nome){var n=clgNorm(nome);return arr.find(function(r){return clgNorm(r.meio)===n;});}\n  function clgOpenConsumoShipPicker(){\n    var bg=ensureModal(\"clgConsumoShipBg\",\"Inserir consumo/abastecimento \u2014 selecione o navio/embarca\u00e7\u00e3o\");\n    var body=bg.querySelector(\".mbody\");\n    var names=clgAllMeios();\n    body.innerHTML=names.length?names.map(function(n){\n      var tags=[clgHasOdm(n)?\"ODM\":null,clgHasGlg(n)?\"Gasolina/Lubrificantes/Graxas\":null].filter(Boolean).join(\" \u00b7 \");\n      return '<div class=\"ps-item\" data-nome=\"'+esc(n)+'\"><div class=\"ps-main\"><div class=\"ps-num\">'+esc(n)+'</div><div class=\"ps-meta\">'+esc(tags)+'</div></div></div>';\n    }).join(\"\"):'<div class=\"spot-empty\">Nenhum meio cadastrado em Estoque de ODM ou em Gasolina/Lubrificantes/Graxas.</div>';\n    body.querySelectorAll(\".ps-item\").forEach(function(el){\n      el.onclick=function(){bg.classList.remove(\"open\");clgOpenTypeStep(el.dataset.nome);};\n    });\n    bg.classList.add(\"open\");\n  }\n  function clgOpenTypeStep(nome){\n    var hasOdm=clgHasOdm(nome),hasGlg=clgHasGlg(nome);\n    if(hasOdm&&!hasGlg){clgOpenModoStep(nome,\"odm\");return;}\n    if(hasGlg&&!hasOdm){clgOpenItemStep(nome);return;}\n    var bg=ensureModal(\"clgConsumoTypeBg\",\"Inserir consumo/abastecimento \u2014 \"+nome);\n    var body=bg.querySelector(\".mbody\");\n    body.innerHTML='<div style=\"display:flex;flex-direction:column;gap:10px\">'+\n      '<button type=\"button\" class=\"ferias-cat-pick\" data-t=\"odm\"><span class=\"ferias-cat-dot\" style=\"background:var(--c-blue)\"></span>Estoque de ODM</button>'+\n      '<button type=\"button\" class=\"ferias-cat-pick\" data-t=\"glg\"><span class=\"ferias-cat-dot\" style=\"background:var(--c-teal)\"></span>Gasolina, Lubrificantes ou Graxas</button>'+\n    '</div>';\n    body.querySelectorAll(\"button\").forEach(function(b){\n      b.onclick=function(){bg.classList.remove(\"open\");if(b.dataset.t===\"odm\")clgOpenModoStep(nome,\"odm\");else clgOpenItemStep(nome);};\n    });\n    bg.classList.add(\"open\");\n  }\n  function clgOpenItemStep(nome){\n    var bg=ensureModal(\"clgConsumoItemBg\",\"Inserir consumo/abastecimento \u2014 \"+nome);\n    var body=bg.querySelector(\".mbody\");\n    var items=[[\"gasolina\",\"Gasolina\",\"var(--c-blue)\"],[\"lubrificantes\",\"Lubrificantes\",\"var(--c-teal)\"],[\"graxas\",\"Graxas\",\"var(--c-amber)\"]];\n    body.innerHTML='<div style=\"display:flex;flex-direction:column;gap:10px\">'+\n      items.map(function(it){return '<button type=\"button\" class=\"ferias-cat-pick\" data-i=\"'+it[0]+'\"><span class=\"ferias-cat-dot\" style=\"background:'+it[2]+'\"></span>'+it[1]+'</button>';}).join(\"\")+\n    '</div>';\n    body.querySelectorAll(\"button\").forEach(function(b){\n      b.onclick=function(){bg.classList.remove(\"open\");clgOpenModoStep(nome,b.dataset.i);};\n    });\n    bg.classList.add(\"open\");\n  }\n  function clgOpenModoStep(nome,tipo){\n    var bg=ensureModal(\"clgModoBg\",\"Inserir \u2014 \"+nome);\n    var body=bg.querySelector(\".mbody\");\n    body.innerHTML='<div style=\"display:flex;flex-direction:column;gap:10px\">'+\n      '<button type=\"button\" class=\"ferias-cat-pick\" data-m=\"consumo\"><span class=\"ferias-cat-dot\" style=\"background:var(--c-red)\"></span>Consumo (abate do estoque)</button>'+\n      '<button type=\"button\" class=\"ferias-cat-pick\" data-m=\"abast\"><span class=\"ferias-cat-dot\" style=\"background:var(--c-teal)\"></span>Abastecimento (soma ao estoque)</button>'+\n    '</div>';\n    body.querySelectorAll(\"button\").forEach(function(b){\n      b.onclick=function(){bg.classList.remove(\"open\");clgOpenQuandoStep(nome,tipo,b.dataset.m);};\n    });\n    bg.classList.add(\"open\");\n  }\n  // Mesmo padr\u00e3o do CONDEF (Nova altera\u00e7\u00e3o \u00d7 Altera\u00e7\u00e3o retroativa): o lan\u00e7amento do dia atualiza\n  // o estoque da tabela; o retroativo serve pra reconstruir o hist\u00f3rico passado de CLG \u2014 s\u00f3 gera\n  // os pontos do gr\u00e1fico de evolu\u00e7\u00e3o/previs\u00e3o, sem alterar o estoque presente.\n  function clgOpenQuandoStep(nome,tipo,modo){\n    var lbl=modo===\"consumo\"?\"consumo\":\"abastecimento\";\n    var bg=ensureModal(\"clgQuandoBg\",\"Inserir \"+lbl+\" \u2014 \"+nome);\n    var body=bg.querySelector(\".mbody\");\n    body.innerHTML=\n      '<div style=\"display:flex;flex-direction:column;gap:10px\">'+\n        '<button type=\"button\" class=\"ps-item\" id=\"clgq_dia\" style=\"text-align:left;cursor:pointer\">'+\n          '<div class=\"ps-main\"><div class=\"ps-num\">Lan\u00e7amento do dia</div>'+\n          '<div class=\"ps-meta\">O '+lbl+' acabou de ocorrer \u2014 atualiza o estoque da tabela e o gr\u00e1fico.</div></div>'+\n        '</button>'+\n        '<button type=\"button\" class=\"ps-item\" id=\"clgq_retro\" style=\"text-align:left;cursor:pointer\">'+\n          '<div class=\"ps-main\"><div class=\"ps-num\">Lan\u00e7amento retroativo</div>'+\n          '<div class=\"ps-meta\">Um per\u00edodo j\u00e1 ocorrido \u2014 os pontos entram no gr\u00e1fico na data informada e o estoque atual tamb\u00e9m \u00e9 atualizado.</div></div>'+\n        '</button>'+\n      '</div>';\n    document.getElementById(\"clgq_dia\").onclick=function(){bg.classList.remove(\"open\");if(modo===\"consumo\")clgOpenConsumoForm(nome,tipo,false);else clgOpenAbastecimentoForm(nome,tipo,false);};\n    document.getElementById(\"clgq_retro\").onclick=function(){bg.classList.remove(\"open\");if(modo===\"consumo\")clgOpenConsumoForm(nome,tipo,true);else clgOpenAbastecimentoForm(nome,tipo,true);};\n    bg.classList.add(\"open\");\n  }\n  function clgConsumoDstr(d){return d.getFullYear()+\"-\"+String(d.getMonth()+1).padStart(2,\"0\")+\"-\"+String(d.getDate()).padStart(2,\"0\");}\n  function clgOpenConsumoForm(nome,tipo,retro,editLanc){\n    var titleMap={odm:\"Estoque de ODM\",gasolina:\"Gasolina\",lubrificantes:\"Lubrificantes\",graxas:\"Graxas\"};\n    var bg=ensureModal(\"clgConsumoFormBg\",(editLanc?\"Editar consumo\":\"Inserir consumo\")+(retro?\" retroativo\":\"\")+\" \u2014 \"+nome+\" \u00b7 \"+titleMap[tipo]);\n    var body=bg.querySelector(\".mbody\");\n    var todayStr=clgConsumoDstr(new Date());\n    body.innerHTML=\n      '<div class=\"mgrid\">'+\n        '<div class=\"fld\"><label>Tipo de consumo</label><select id=\"clgc_tipo\"><option value=\"Operativo\">Operativo</option><option value=\"Administrativo\">Administrativo</option></select></div>'+\n        '<div class=\"fld\"><label>Data (fim do per\u00edodo)</label><input type=\"date\" id=\"clgc_data\" value=\"'+todayStr+'\"></div>'+\n        '<div class=\"fld\"><label>Quantidade consumida (total)</label><input id=\"clgc_qtd\" placeholder=\"Ex.: 150\" inputmode=\"decimal\"></div>'+\n        '<div class=\"fld\"><label>Dias de comiss\u00e3o</label><input id=\"clgc_dias\" placeholder=\"Ex.: 5\" inputmode=\"numeric\" value=\"1\"></div>'+\n        // Campos condicionais ao tipo: Operativo exige N\u00ba do evento PMPE + descri\u00e7\u00e3o; Administrativo\n        // aceita uma justificativa opcional. Alternados pelo onchange do select.\n        '<div class=\"fld\" id=\"clgc_fld_evento\"><label>N\u00ba Evento PMPE *</label><input id=\"clgc_evento\" placeholder=\"Ex.: 034/2026\"></div>'+\n        '<div class=\"fld\" id=\"clgc_fld_descricao\"><label>Descri\u00e7\u00e3o *</label><input id=\"clgc_descricao\" placeholder=\"Ex.: Patrulha naval no rio Guam\u00e1\"></div>'+\n        '<div class=\"fld full\" id=\"clgc_fld_justificativa\" style=\"display:none\"><label>Justificativa (opcional)</label><input id=\"clgc_justificativa\" placeholder=\"Ex.: Teste de motores no porto\"></div>'+\n        '<div class=\"fld full\" style=\"font-size:10.5px;color:var(--text3)\">'+(retro?\"Lan\u00e7amento retroativo: gera o hist\u00f3rico de consumo dia a dia no gr\u00e1fico de evolu\u00e7\u00e3o <b>na data informada</b> e abate a quantidade do estoque atual da tabela.\":\"A quantidade total \u00e9 dividida pela m\u00e9dia di\u00e1ria ao longo dos dias de comiss\u00e3o informados, gerando um hist\u00f3rico de consumo dia a dia (usado no gr\u00e1fico de evolu\u00e7\u00e3o e na previs\u00e3o de dura\u00e7\u00e3o do estoque).\")+'</div>'+\n      '</div>'+\n      '<div id=\"clgc_err\" class=\"ferias-msg warn\" style=\"display:none;margin-top:10px\"></div>'+\n      '<div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:14px\">'+\n        '<button class=\"bcancel\" id=\"clgc_cancel\">Cancelar</button>'+\n        '<button class=\"bsave\" id=\"clgc_save\">Salvar</button>'+\n      '</div>';\n    var tipoSel=document.getElementById(\"clgc_tipo\");\n    tipoSel.onchange=function(){\n      var op=tipoSel.value===\"Operativo\";\n      document.getElementById(\"clgc_fld_evento\").style.display=op?\"\":\"none\";\n      document.getElementById(\"clgc_fld_descricao\").style.display=op?\"\":\"none\";\n      document.getElementById(\"clgc_fld_justificativa\").style.display=op?\"none\":\"\";\n    };\n    if(editLanc){\n      tipoSel.value=editLanc.tipoConsumo.charAt(0).toUpperCase()+editLanc.tipoConsumo.slice(1).toLowerCase();\n      tipoSel.onchange();\n      document.getElementById(\"clgc_data\").value=editLanc.data.split(\"/\").reverse().join(\"-\");\n      document.getElementById(\"clgc_qtd\").value=editLanc.qtd;\n      document.getElementById(\"clgc_dias\").value=editLanc.dias;\n      var mm=/^PMPE (.*?) \u00b7 ([\\s\\S]*)$/.exec(editLanc.extra||\"\");\n      if(mm){document.getElementById(\"clgc_evento\").value=mm[1];document.getElementById(\"clgc_descricao\").value=mm[2];}\n      var mj=/^Justificativa: ([\\s\\S]*)$/.exec(editLanc.extra||\"\");\n      if(mj)document.getElementById(\"clgc_justificativa\").value=mj[1];\n    }\n    document.getElementById(\"clgc_cancel\").onclick=function(){bg.classList.remove(\"open\");};\n    document.getElementById(\"clgc_save\").onclick=function(){clgSaveConsumo(nome,tipo,bg,retro,editLanc);};\n    bg.classList.add(\"open\");\n  }\n  // Gera \"dias\" pontos di\u00e1rios no hist\u00f3rico (clgHist[histKey]), do estoque anterior at\u00e9 o estoque\n  // final, distribuindo o consumo total em m\u00e9dia di\u00e1ria \u2014 assim o gr\u00e1fico de evolu\u00e7\u00e3o e a previs\u00e3o\n  // de dura\u00e7\u00e3o (que dependem de \u22652 leituras em datas diferentes) j\u00e1 refletem o consumo real do\n  // per\u00edodo de comiss\u00e3o, em vez de um \u00fanico salto no dia do lan\u00e7amento.\n  function clgAppendHistDaily(histKey,dataStr,totalQtd,dias,estoqueAntes){\n    var arr=clgHist[histKey]||(clgHist[histKey]=[]);\n    var endDay=new Date(dataStr+\"T00:00:00\");endDay.setHours(0,0,0,0);\n    var avg=totalQtd/dias;\n    for(var i=0;i<dias;i++){\n      var dayDt=new Date(endDay.getTime());dayDt.setDate(dayDt.getDate()-(dias-1-i));\n      var t=dayDt.getTime();\n      var v=(i===dias-1)?Math.max(0,estoqueAntes-totalQtd):Math.max(0,estoqueAntes-avg*(i+1));\n      var existing=arr.find(function(p){return p.t===t;});\n      if(existing)existing.v=v;else arr.push({t:t,v:v});\n    }\n    arr.sort(function(a,b){return a.t-b.t;});\n    if(arr.length>200)arr.splice(0,arr.length-200);\n    clgSaveHist();\n  }\n  // Baseline do lan\u00e7amento retroativo: valor do \u00faltimo ponto do hist\u00f3rico anterior ao in\u00edcio do\n  // per\u00edodo; se n\u00e3o houver, primeiro ponto posterior + qtd (pra curva \"encaixar\"); sen\u00e3o, o\n  // estoque atual + qtd \u2014 assim o gr\u00e1fico desce at\u00e9 um valor coerente sem mexer no estoque.\n  function clgRetroBaseline(histKey,dataStr,dias,qtd,estoqueAtual){\n    var pts=(clgHist[histKey]||[]).slice().sort(function(a,b){return a.t-b.t;});\n    var endT=new Date(dataStr+\"T00:00:00\").getTime();\n    var startT=endT-(dias-1)*86400000;\n    var before=null,after=null;\n    pts.forEach(function(p){if(p.t<startT)before=p;else if(p.t>endT&&!after)after=p;});\n    if(before)return before.v;\n    if(after)return after.v+qtd;\n    return(isNaN(estoqueAtual)?0:estoqueAtual)+qtd;\n  }\n  async function clgSaveConsumo(nome,tipo,bg,retro,editLanc){\n    var qtd=clgNum(document.getElementById(\"clgc_qtd\").value);\n    var errEl=document.getElementById(\"clgc_err\");\n    if(isNaN(qtd)||qtd<=0){errEl.textContent=\"Informe uma quantidade v\u00e1lida (maior que zero).\";errEl.style.display=\"block\";return;}\n    var dias=Math.round(clgNum(document.getElementById(\"clgc_dias\").value));\n    if(isNaN(dias)||dias<1){errEl.textContent=\"Informe um n\u00famero v\u00e1lido de dias de comiss\u00e3o (m\u00ednimo 1).\";errEl.style.display=\"block\";return;}\n    var tipoConsumo=document.getElementById(\"clgc_tipo\").value;\n    var evento=(document.getElementById(\"clgc_evento\").value||\"\").trim();\n    var descricao=(document.getElementById(\"clgc_descricao\").value||\"\").trim();\n    var justificativa=(document.getElementById(\"clgc_justificativa\").value||\"\").trim();\n    if(tipoConsumo===\"Operativo\"&&(!evento||!descricao)){errEl.textContent=\"Consumo operativo exige N\u00ba Evento PMPE e Descri\u00e7\u00e3o.\";errEl.style.display=\"block\";return;}\n    errEl.style.display=\"none\";\n    var dataStr=document.getElementById(\"clgc_data\").value||clgConsumoDstr(new Date());\n    var dataFmt=dataStr.split(\"-\").reverse().join(\"/\");\n    var extra=tipoConsumo===\"Operativo\"?(\" \u00b7 PMPE \"+evento+\" \u00b7 \"+descricao):(justificativa?(\" \u00b7 Justificativa: \"+justificativa):\"\");\n    var lbl=retro?\"Consumo retroativo (\"+tipoConsumo.toLowerCase()+\")\":\"Consumo \"+tipoConsumo.toLowerCase();\n    // Edi\u00e7\u00e3o: estorna o lan\u00e7amento original em sil\u00eancio e aplica o novo em seguida.\n    if(editLanc)await clgEstornarLanc(editLanc,true);\n    if(tipo===\"odm\"){\n      var row=clgFindByNome(clgT1,nome);\n      if(!row)return;\n      var atual=clgNum(row.estoque);atual=isNaN(atual)?0:atual;\n      row.estoque=String(Math.max(0,atual-qtd));\n      clgSaveT1();\n      await pushKV(\"clgPush\",CLG_T1_KEY,clgT1);\n      // Retroativo: os pontos do gr\u00e1fico entram na data informada, ancorados no hist\u00f3rico\n      // (n\u00e3o no estoque de hoje); o abatimento no estoque atual \u00e9 o mesmo dos lan\u00e7amentos do dia.\n      if(retro)clgAppendHistDaily(row.id,dataStr,qtd,dias,clgRetroBaseline(row.id,dataStr,dias,qtd,atual));\n      else clgAppendHistDaily(row.id,dataStr,qtd,dias,atual);\n      auditPushOne(\"clg_t1\",row.id,lbl+\": -\"+qtd+\" em \"+dias+\" dia(s) (\"+dataFmt+\")\"+extra);\n      touchLastEdit(\"clg_t1\");paintLastEdit(\"clg_t1_lastedit\",\"clg_t1\");\n    }else{\n      var isNav=!!clgFindByNome(clgT3Nav,nome);\n      var arr=isNav?clgT3Nav:clgT3Emb;\n      var row2=clgFindByNome(arr,nome);\n      if(!row2)return;\n      var atual2=clgNum(row2[tipo]);atual2=isNaN(atual2)?0:atual2;\n      var histKey=row2.id+\"_\"+tipo;\n      row2[tipo]=String(Math.max(0,atual2-qtd));\n      if(isNav){clgSaveT3Nav();await pushKV(\"clgPush\",CLG_T3NAV_KEY,clgT3Nav);}\n      else{clgSaveT3Emb();await pushKV(\"clgPush\",CLG_T3EMB_KEY,clgT3Emb);}\n      if(retro)clgAppendHistDaily(histKey,dataStr,qtd,dias,clgRetroBaseline(histKey,dataStr,dias,qtd,atual2));\n      else clgAppendHistDaily(histKey,dataStr,qtd,dias,atual2);\n      auditPushOne(isNav?\"clg_t3nav\":\"clg_t3emb\",row2.id,lbl+\" de \"+tipo+\": -\"+qtd+\" em \"+dias+\" dia(s) (\"+dataFmt+\")\"+extra);\n      touchLastEdit(isNav?\"clg_t3nav\":\"clg_t3emb\");paintLastEdit(isNav?\"clg_t3nav_lastedit\":\"clg_t3emb_lastedit\",isNav?\"clg_t3nav\":\"clg_t3emb\");\n    }\n    bg.classList.remove(\"open\");\n    toast(retro?\"\ud83d\udcdc Consumo retroativo registrado \u2014 estoque e gr\u00e1fico atualizados\":\"\u2713 Consumo registrado\",\"ok\");\n    clgLogEstoque();\n    renderClgTables();\n  }\n  /* \u2500\u2500 Abastecimento: fun\u00e7\u00e3o inversa do consumo \u2014 soma ao estoque em vez de abater. O tipo\n     (ODM/Gasolina/Lubrificante/Graxa) j\u00e1 foi escolhido na etapa anterior (clgOpenTypeStep/\n     clgOpenItemStep), ent\u00e3o aqui s\u00f3 falta Data e Quantidade. \u2500\u2500 */\n  function clgOpenAbastecimentoForm(nome,tipo,retro,editLanc){\n    var titleMap={odm:\"Estoque de ODM\",gasolina:\"Gasolina\",lubrificantes:\"Lubrificantes\",graxas:\"Graxas\"};\n    var bg=ensureModal(\"clgAbastFormBg\",(editLanc?\"Editar abastecimento\":\"Inserir abastecimento\")+(retro?\" retroativo\":\"\")+\" \u2014 \"+nome+\" \u00b7 \"+titleMap[tipo]);\n    var body=bg.querySelector(\".mbody\");\n    var todayStr=clgConsumoDstr(new Date());\n    body.innerHTML=\n      '<div class=\"mgrid\">'+\n        '<div class=\"fld\"><label>Data</label><input type=\"date\" id=\"clga_data\" value=\"'+todayStr+'\"></div>'+\n        '<div class=\"fld full\"><label>Quantidade abastecida</label><input id=\"clga_qtd\" placeholder=\"Ex.: 150\" inputmode=\"decimal\"></div>'+\n        (retro?'<div class=\"fld full\" style=\"font-size:10.5px;color:var(--text3)\">Lan\u00e7amento retroativo: registra o abastecimento no gr\u00e1fico de evolu\u00e7\u00e3o <b>na data informada</b> e soma a quantidade ao estoque atual da tabela.</div>':'')+\n      '</div>'+\n      '<div id=\"clga_err\" class=\"ferias-msg warn\" style=\"display:none;margin-top:10px\"></div>'+\n      '<div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:14px\">'+\n        '<button class=\"bcancel\" id=\"clga_cancel\">Cancelar</button>'+\n        '<button class=\"bsave\" id=\"clga_save\">Salvar</button>'+\n      '</div>';\n    if(editLanc){\n      document.getElementById(\"clga_data\").value=editLanc.data.split(\"/\").reverse().join(\"-\");\n      document.getElementById(\"clga_qtd\").value=editLanc.qtd;\n    }\n    document.getElementById(\"clga_cancel\").onclick=function(){bg.classList.remove(\"open\");};\n    document.getElementById(\"clga_save\").onclick=function(){clgSaveAbastecimento(nome,tipo,bg,retro,editLanc);};\n    bg.classList.add(\"open\");\n  }\n  // Anota um ponto de abastecimento no hist\u00f3rico do gr\u00e1fico. No retroativo o valor parte do\n  // \u00faltimo ponto anterior \u00e0 data (ou do estoque atual, se n\u00e3o houver hist\u00f3rico), sem tocar na tabela.\n  function clgHistPushPoint(histKey,dataStr,v){\n    var arr=clgHist[histKey]||(clgHist[histKey]=[]);\n    var t=new Date(dataStr+\"T00:00:00\").getTime();\n    var existing=arr.find(function(p){return p.t===t;});\n    if(existing)existing.v=v;else arr.push({t:t,v:v});\n    arr.sort(function(a,b){return a.t-b.t;});\n    if(arr.length>200)arr.splice(0,arr.length-200);\n    clgSaveHist();\n  }\n  async function clgSaveAbastecimento(nome,tipo,bg,retro,editLanc){\n    var qtd=clgNum(document.getElementById(\"clga_qtd\").value);\n    var errEl=document.getElementById(\"clga_err\");\n    if(isNaN(qtd)||qtd<=0){errEl.textContent=\"Informe uma quantidade v\u00e1lida (maior que zero).\";errEl.style.display=\"block\";return;}\n    errEl.style.display=\"none\";\n    var dataStr=document.getElementById(\"clga_data\").value||clgConsumoDstr(new Date());\n    var dataFmt=dataStr.split(\"-\").reverse().join(\"/\");\n    var lbl=retro?\"Abastecimento retroativo\":\"Abastecimento\";\n    if(editLanc)await clgEstornarLanc(editLanc,true);\n    if(tipo===\"odm\"){\n      var row=clgFindByNome(clgT1,nome);\n      if(!row)return;\n      var atual=clgNum(row.estoque);atual=isNaN(atual)?0:atual;\n      row.estoque=String(atual+qtd);\n      clgSaveT1();\n      await pushKV(\"clgPush\",CLG_T1_KEY,clgT1);\n      if(retro)clgHistPushPoint(row.id,dataStr,clgRetroBaseline(row.id,dataStr,1,0,atual)+qtd);\n      else clgHistPushPoint(row.id,dataStr,atual+qtd);\n      auditPushOne(\"clg_t1\",row.id,lbl+\": +\"+qtd+\" (\"+dataFmt+\")\");\n      touchLastEdit(\"clg_t1\");paintLastEdit(\"clg_t1_lastedit\",\"clg_t1\");\n    }else{\n      var isNav=!!clgFindByNome(clgT3Nav,nome);\n      var arr2=isNav?clgT3Nav:clgT3Emb;\n      var row2=clgFindByNome(arr2,nome);\n      if(!row2)return;\n      var atual2=clgNum(row2[tipo]);atual2=isNaN(atual2)?0:atual2;\n      var histKey=row2.id+\"_\"+tipo;\n      row2[tipo]=String(atual2+qtd);\n      if(isNav){clgSaveT3Nav();await pushKV(\"clgPush\",CLG_T3NAV_KEY,clgT3Nav);}\n      else{clgSaveT3Emb();await pushKV(\"clgPush\",CLG_T3EMB_KEY,clgT3Emb);}\n      if(retro)clgHistPushPoint(histKey,dataStr,clgRetroBaseline(histKey,dataStr,1,0,atual2)+qtd);\n      else clgHistPushPoint(histKey,dataStr,atual2+qtd);\n      auditPushOne(isNav?\"clg_t3nav\":\"clg_t3emb\",row2.id,lbl+\" de \"+tipo+\": +\"+qtd+\" (\"+dataFmt+\")\");\n      touchLastEdit(isNav?\"clg_t3nav\":\"clg_t3emb\");paintLastEdit(isNav?\"clg_t3nav_lastedit\":\"clg_t3emb_lastedit\",isNav?\"clg_t3nav\":\"clg_t3emb\");\n    }\n    bg.classList.remove(\"open\");\n    toast(retro?\"\ud83d\udcdc Abastecimento retroativo registrado \u2014 estoque e gr\u00e1fico atualizados\":\"\u2713 Abastecimento registrado\",\"ok\");\n    clgLogEstoque();\n    renderClgTables();\n  }\n  /* \u2500\u2500 Editar lan\u00e7amentos: lista os consumos/abastecimentos j\u00e1 inseridos \u2014 reconstru\u00eddos a partir\n     do log de auditoria, que registra quantidade/dias/data de cada um \u2014 e permite estornar:\n     devolve (ou retira) a quantidade do estoque e reverte os pontos do hist\u00f3rico usados pelo\n     gr\u00e1fico de evolu\u00e7\u00e3o e pela previs\u00e3o de dura\u00e7\u00e3o. O registro original fica marcado como\n     estornado (some da lista, mas permanece na auditoria), e o estorno gera novo registro. \u2500\u2500 */\n  var CLG_LANC_ARRMAP=function(){return{clg_t1:clgT1,clg_t3nav:clgT3Nav,clg_t3emb:clgT3Emb};};\n  clgParseLanc=function(e){\n    if([\"clg_t1\",\"clg_t3nav\",\"clg_t3emb\"].indexOf(e.scope)<0||e.estornado)return null;\n    var m=/^Consumo retroativo \\((\\S+)\\)(?: de (\\w+))?: -([\\d.,]+) em (\\d+) dia\\(s\\) \\((\\d{2}\\/\\d{2}\\/\\d{4})\\)( \u00b7 .+)?$/.exec(e.action||\"\");\n    if(m)return{kind:\"consumo\",retro:true,tipoConsumo:m[1],produto:m[2]||\"odm\",qtd:clgNum(m[3]),dias:+m[4],data:m[5],extra:(m[6]||\"\").replace(/^ \u00b7 /,\"\"),e:e};\n    m=/^Consumo (\\S+)(?: de (\\w+))?: -([\\d.,]+) em (\\d+) dia\\(s\\) \\((\\d{2}\\/\\d{2}\\/\\d{4})\\)( \u00b7 .+)?$/.exec(e.action||\"\");\n    if(m)return{kind:\"consumo\",retro:false,tipoConsumo:m[1],produto:m[2]||\"odm\",qtd:clgNum(m[3]),dias:+m[4],data:m[5],extra:(m[6]||\"\").replace(/^ \u00b7 /,\"\"),e:e};\n    m=/^Abastecimento( retroativo)?(?: de (\\w+))?: \\+([\\d.,]+) \\((\\d{2}\\/\\d{2}\\/\\d{4})\\)$/.exec(e.action||\"\");\n    if(m)return{kind:\"abastecimento\",retro:!!m[1],produto:m[2]||\"odm\",qtd:clgNum(m[3]),dias:1,data:m[4],e:e};\n    return null;\n  }\n  // silent=true: usado pelo \"Editar lan\u00e7amento\" (estorna o antigo e reaplica o novo em seguida) \u2014\n  // sem toast/re-render pr\u00f3prios e sem registro de estorno na auditoria, s\u00f3 o do novo lan\u00e7amento.\n  async function clgEstornarLanc(l,silent){\n    var arr=CLG_LANC_ARRMAP()[l.e.scope];\n    var row=arr.find(function(r){return r.id===l.e.rowId;});\n    if(!row){toast(\"Meio n\u00e3o encontrado \u2014 n\u00e3o \u00e9 poss\u00edvel estornar.\",\"info\");return;}\n    var field=l.e.scope===\"clg_t1\"?\"estoque\":l.produto;\n    var atual=clgNum(row[field]);atual=isNaN(atual)?0:atual;\n    row[field]=String(Math.max(0,l.kind===\"consumo\"?atual+l.qtd:atual-l.qtd));\n    if(l.e.scope===\"clg_t1\"){clgSaveT1();await pushKV(\"clgPush\",CLG_T1_KEY,clgT1);}\n    else if(l.e.scope===\"clg_t3nav\"){clgSaveT3Nav();await pushKV(\"clgPush\",CLG_T3NAV_KEY,clgT3Nav);}\n    else{clgSaveT3Emb();await pushKV(\"clgPush\",CLG_T3EMB_KEY,clgT3Emb);}\n    var histKey=l.e.scope===\"clg_t1\"?row.id:row.id+\"_\"+l.produto;\n    var pts=clgHist[histKey]||[];\n    var endT=new Date(l.data.split(\"/\").reverse().join(\"-\")+\"T00:00:00\").getTime();\n    // Os pontos do per\u00edodo do lan\u00e7amento s\u00e3o DESCARTADOS (n\u00e3o restaurados): sen\u00e3o sobrava uma\n    // \"leitura\" fantasma no gr\u00e1fico e na previs\u00e3o de dura\u00e7\u00e3o ao editar/estornar um lan\u00e7amento.\n    // Pontos posteriores s\u00f3 s\u00e3o deslocados em lan\u00e7amentos n\u00e3o-retroativos (retroativo nunca os moveu).\n    if(l.kind===\"consumo\"){\n      var startT=endT-(l.dias-1)*86400000;\n      clgHist[histKey]=pts.filter(function(p){return p.t<startT||p.t>endT;});\n      if(!l.retro)clgHist[histKey].forEach(function(p){if(p.t>endT)p.v+=l.qtd;});\n    }else{\n      clgHist[histKey]=pts.filter(function(p){return p.t!==endT;});\n      if(!l.retro)clgHist[histKey].forEach(function(p){if(p.t>endT)p.v=Math.max(0,p.v-l.qtd);});\n    }\n    clgSaveHist();\n    l.e.estornado=true;\n    // Mesmo no estorno silencioso (edi\u00e7\u00e3o), o ponto de hoje do gr\u00e1fico precisa refletir o estoque\n    // j\u00e1 revertido: sen\u00e3o a baseline do relan\u00e7amento ancora num ponto desatualizado e soma a\n    // quantidade duas vezes (saldo inicial dobrado no gr\u00e1fico).\n    clgLogEstoque();\n    if(!silent){\n      auditPushOne(l.e.scope,l.e.rowId,\"Estorno de \"+l.kind+(l.retro?\" retroativo\":\"\")+(l.produto!==\"odm\"?\" de \"+l.produto:\"\")+\": \"+(l.kind===\"consumo\"?\"+\":\"-\")+l.qtd+\" (\"+l.data+\")\");\n      touchLastEdit(l.e.scope);paintLastEdit(l.e.scope+\"_lastedit\",l.e.scope);\n      toast(\"\u2713 Lan\u00e7amento estornado\",\"ok\");\n      renderClgTables();\n    }\n  }\n  var clgLancFuel=\"odm\"; // filtro lembrado enquanto o modal for reaberto na mesma sess\u00e3o\n  function clgOpenLancamentos(fuel){\n    if(typeof fuel===\"string\")clgLancFuel=fuel; // guarda: onclick direto passa o event como 1\u00ba arg\n    var bg=ensureModal(\"clgLancBg\",\"Lan\u00e7amentos de consumo/abastecimento\");\n    var body=bg.querySelector(\".mbody\");\n    // Ordena pela data do lan\u00e7amento (n\u00e3o pela hora em que foi digitado): mais recente no topo,\n    // com agrupamento por m\u00eas. Empate na data \u2192 desempata pela hora de registro.\n    function dOrd(l){var p=l.data.split(\"/\");return p[2]+p[1]+p[0];}\n    var todos=auditLog.map(clgParseLanc).filter(Boolean).sort(function(a,b){\n      return dOrd(b).localeCompare(dOrd(a))||String(b.e.ts).localeCompare(String(a.e.ts));\n    });\n    // Filtro por tipo de combust\u00edvel: ODM \u00d7 Gasolina/Lubrificantes/Graxas\n    var lancs=todos.filter(function(l){return clgLancFuel===\"odm\"?l.produto===\"odm\":l.produto!==\"odm\";});\n    var prodLbl={odm:\"ODM\",gasolina:\"Gasolina\",lubrificantes:\"Lubrificantes\",graxas:\"Graxas\"};\n    function fuelBtn(val,label){\n      var on=clgLancFuel===val;\n      return '<button type=\"button\" class=\"clg-lanc-fuel\" data-f=\"'+val+'\" style=\"flex:1;padding:7px 10px;font-size:12px;font-family:inherit;cursor:pointer;border-radius:var(--r-md);border:1.5px solid '+(on?'var(--c-blue)':'var(--border2)')+';background:'+(on?'var(--c-sky)':'var(--bg)')+';color:'+(on?'var(--c-blue)':'var(--text2)')+';font-weight:'+(on?'700':'400')+'\">'+label+'</button>';\n    }\n    var html='<div style=\"display:flex;gap:8px;margin-bottom:10px\">'+fuelBtn(\"odm\",\"ODM\")+fuelBtn(\"glg\",\"Gasolina/Lubrificantes/Graxas\")+'</div>';\n    if(!lancs.length){\n      html+='<div style=\"font-size:12px;color:var(--text3);font-style:italic\">Nenhum lan\u00e7amento de '+(clgLancFuel===\"odm\"?\"ODM\":\"Gasolina/Lubrificantes/Graxas\")+' registrado ainda.</div>';\n    }else{\n      html+='<div style=\"font-size:11px;color:var(--text3);margin-bottom:8px\">Clique no m\u00eas para abrir os lan\u00e7amentos. Editar reabre o formul\u00e1rio com os valores do lan\u00e7amento e substitui o efeito dele; Estornar apenas desfaz.</div>';\n      // Meses como sanfonas (<details>): comprimidos por padr\u00e3o, clique no m\u00eas expande a lista.\n      var lastGrp=null;\n      lancs.forEach(function(l){\n        var p=l.data.split(\"/\"),grp=p[1]+\"/\"+p[2];\n        var i=todos.indexOf(l);\n        if(grp!==lastGrp){\n          if(lastGrp!==null)html+='</div></details>';\n          lastGrp=grp;\n          var count=lancs.filter(function(x){var q=x.data.split(\"/\");return q[1]+\"/\"+q[2]===grp;}).length;\n          html+='<details style= ion(r){\n      var v=horasParseNum(r.horasOperacao);\n      if(isNaN(v))return;\n      var arr=horasHist[r.id]||(horasHist[r.id]=[]);\n      var last=arr[arr.length-1];\n      if(last&&last.t===t){if(last.v!==v){last.v=v;changed=true;}return;}\n      if(last&&last.v===v)return;\n      arr.push({t:t,v:v});changed=true;\n      if(arr.length>200)arr.splice(0,arr.length-200);\n    });\n    if(changed)horasSaveHist();\n  }\n  function lchartStrongNorm(s){return String(s||\"\").normalize(\"NFD\").replace(/[\\u0300-\\u036f]/g,\"\").toLowerCase().replace(/[^a-z0-9]/g,\"\");}\n  function lchartMonthRange(y,m){return{ini:new Date(y,m-1,1).getTime(),fim:new Date(y,m,0).getTime()};}\n  function lchartOverlapDias(aIni,aFim,bIni,bFim){var lo=Math.max(aIni,bIni),hi=Math.min(aFim,bFim);return lo>hi?0:Math.round((hi-lo)/86400000)+1;}\n  function horasFmtDec(n){return String((Math.round(n*10)/10).toFixed(1)).replace(\".\",\",\");}\n  /* Dias de comiss\u00e3o de um meio (navio) num m\u00eas, para a m\u00e9dia de h/dia do gr\u00e1fico de Horas.\n     1) PMPE (aba Navios \u203a Comiss\u00f5es): cobre o caso de comiss\u00e3o \"quebrada\" entre a virada de um m\u00eas\n        e o outro \u2014 ex. comiss\u00e3o de 15/mar a 04/abr aparece em ambos os meses, mesmo que o consumo\n        de ODM s\u00f3 tenha sido lan\u00e7ado inteiro em mar\u00e7o. 2) Sem PMPE, cai para os \"dias\" somados dos\n        lan\u00e7amentos de consumo do CLG naquele m\u00eas (o meio precisa ter subsido para consumir ODM). */\n  function horasComissaoMes(shipTitle,y,m){\n    var norm=lchartStrongNorm(shipTitle);\n    var clgRow=clgT1.find(function(r){return lchartStrongNorm(r.meio)===norm;});\n    var mr=lchartMonthRange(y,m),qtdMes=0;\n    if(clgRow)auditLog.forEach(function(e){\n      var l=clgParseLanc(e);\n      if(!l||l.e.scope!==\"clg_t1\"||l.e.rowId!==clgRow.id||l.kind!==\"consumo\")return;\n      var t=new Date(l.data.split(\"/\").reverse().join(\"-\")+\"T00:00:00\").getTime();\n      if(t>=mr.ini&&t<=mr.f ction effectiveAfastSubtipo(subtipo,nome,editId){\n    if(editId||subtipo!==\"maternidade\")return subtipo;\n    var baseUsado=diasUsadosAfastamento(nome,\"maternidade\",null)>0;\n    var prorrUsado=diasUsadosAfastamento(nome,\"maternidade_prorrogacao\",null)>0;\n    return(baseUsado&&!prorrUsado)?\"maternidade_prorrogacao\":\"maternidade\";\n  }\n  function pessoalCleanupPastPrevisoes(){\n    var todayStr=dstr(new Date());\n    var before=pessoalFerias.length;\n    pessoalFerias=pessoalFerias.filter(function(f){return !(f.categoria===\"ferias\"&&f.tipo===\"previsao\"&&f.fim<todayStr);});\n    if(pessoalFerias.length!==before){\n      pessoalSaveFerias();\n      pushKV(\"pessoalPush\",PESSOAL_FERIAS_KEY,pessoalFerias);\n      toast((before-pessoalFerias.length)+\" previs\u00e3o(\u00f5es) de f\u00e9rias vencida(s) foram removidas automaticamente.\",\"info\");\n    }\n  }\n  // Disponibilidade/Per\u00edodo consideram s\u00f3 afastamentos REAIS em curso hoje (gozo de f\u00e9rias, destaques,\n  // LTS, dispensa, licen\u00e7a). Previs\u00e3o de f\u00e9rias n\u00e3o conta \u2014 \u00e9 planejamento futuro, n\u00e3o afastamento\n  // efetivo. Assim que o per\u00edodo lan\u00e7ado no Calend\u00e1rio termina, volta sozinho pra Dispon\u00edvel / \"-\".\n  function pessoalStatusOf(nome){\n    var todayStr=dstr(new Date());\n    var emb=embarqueDs(nome);\n    if(emb&&todayStr<emb)return{label:\"Aguardando embarque\",periodo:emb.split(\"-\").reverse().join(\"/\")};\n    var entry=pessoalFerias.find(function(f){\n      if(f.militar!==nome||todayStr<f.inicio||todayStr>f.fim)return false;\n      return f.categoria===\"ferias\"?f.tipo===\"gozo\":true;\n    });\n    if(!entry)return{label:\"Dispon\u00edvel\",periodo:\"-\"};\n    var label=entry.categoria===\"ferias\"?\"F\u00e9rias\":catLabel(entry.categoria,entry.tipo);\n    var periodo=entry.inicio.split(\"-\").reverse().join(\"/\")+\" a \"+entry.fim.split(\"-\").reverse().join(\"/\");\n    return{label:label,periodo:periodo};\n  }\n  function pessoalRecalcVacation(){\n    pessoalRows.forEach(function(r){\n      var nome=r.nome||\"\";\n      var gozadas=vacationDaysOf(nome,\"gozo\");\n      var st=pessoalStatusOf(nome);\n      r.disponibilidade=st.label;\n      r.periodo=st.periodo;\n      r.feriasGozadas=String(gozadas);\n      r.feriasDisponiveis=String(Math.max(0,FERIAS_TOTAL_DIAS-gozadas));\n      var prevEntries=pessoalFerias.filter(function(f){return f.militar===nome&&f.categoria===\"ferias\"&&f.tipo===\"previsao\";});\n      r.previsaoFerias=prevEntries.map(function(f){\n        return f.inicio.split(\"-\").reverse().join(\"/\")+\" a \"+f.fim.split(\"-\").reverse().join(\"/\")+\" (\"+periodDays(f.inicio,f.fim)+\"d)\";\n      }).join(\"\\n\");\n    });\n  }\n  function renderFeriasLegend(){\n    var box=document.getElementById(\"ferias_legend\");\n    if(!box)return;\n    box.innerHTML=GROUPS.map(function(g){\n      return '<span class=\"ferias-sw\" style=\"background:'+g.color+'\">'+g.letter+'</span> '+esc(g.label);\n    }).join(\" &nbsp; \")+' &nbsp; <span class=\"ferias-sw\" style=\"background:#3a3f45\"></span> Antes do embarque';\n  }\n  function renderFeriasTable(){\n    var table=document.getElementById(\"ferias_table\");\n    if(!table)return;\n    var body=pessoalRows.map(function(r){\n      var nome=r.nome||\"\",label=militarLabel(r);\n      var cells=FERIAS_DAYS.map(function(d){\n        var ds=dstr(d),info=dayInfo(nome,ds),st=info.st,entry=info.entry;\n        var tip=esc(label)+\" \u2014 \"+d.toLocaleDateString(\"pt-BR\");\n        if(entry){\n          tip+=\" \u00b7 \"+esc(catLabel(entry.categoria,entry.tipo))+\" (\"+entry.inicio.split(\"-\").reverse().join(\"/\")+\" a \"+entry.fim.split(\"-\").reverse().join(\"/\")+\") \u2014 clique para detalhes\";\n          return '<td class=\"fcell '+st+' fclick\" role=\"button\" tabindex=\"0\" data-fid=\"'+entry.id+'\" style=\"--mtint:'+monthTintFor(d)+'\" title=\"'+tip+'\">'+entryLetter(entry)+'</td>';\n        }\n        return '<td class=\"fcell'+(st?\" \"+st:\"\")+'\" style=\"--mtint:'+monthTintFor(d)+'\" title=\"'+tip+'\"></td>';\n      }).join(\"\");\n      return '<tr><td class=\"fname\">'+esc(label)+'</td>'+cells+'</tr>';\n    }).join(\"\");\n    table.innerHTML=feriasTheadHtml()+'<tbody>'+body+'</tbody>';\n    table.onclick=function(e){var td=e.target.closest(\"td.fclick\");if(td)openFeriasDetail(td.dataset.fid);};\n    table.onkeydown=function(e){if(e.key!==\"Enter\"&&e.key!==\" \")return;var td=e.target.closest(\"td.fclick\");if(td){e.preventDefault();openFeriasDetail(td.dataset.fid);}};\n  }\n  /* \u2500\u2500 Janela de refer\u00eancia de um per\u00edodo lan\u00e7ado (clique no quadradinho do calend\u00e1rio) \u2500\u2500 */\n  function openFeriasDetail(id){\n    var f=pessoalFerias.find(function(x){return x.id===id;});\n    if(!f)return;\n    var gk=entryGroupKey(f),g=groupOf(gk)||{color:\"#4a7dc4\",label:\"Afastamento\",letter:\"A\"};\n    var dias=periodDays(f.inicio,f.fim);\n    var ini=f.inicio.split(\"-\").reverse().join(\"/\"),fim=f.fim.split(\"-\").reverse().join(\"/\");\n    var hoje=dstr(new Date());\n    var status=hoje<f.inicio?[\"Previsto\",\"var(--c-blue)\"]:(hoje>f.fim?[\"Conclu\u00eddo\",\"var(--text3)\"]:[\"Em curso\",\"var(--c-teal)\"]);\n    var bg=ensureModal(\"fdetbg\",\"Per\u00edodo lan\u00e7ado \u2014 refer\u00eancia\");\n    var body=bg.querySelector(\".mbody\");\n    function fld(k,v){return '<div style=\"border:1px solid var(--border);border-radius:var(--r-md);padding:8px 11px;background:var(--c-50)\"><b style=\"display:block;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:2px\">'+k+'</b><span style=\"font-size:13px;font-weight:600\">'+v+'</span></div>';}\n    body.innerHTML=\n      '<div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap\">'+\n        '<span style=\"width:38px;height:38px;border-radius:9px;background:linear-gradient(180deg,color-mix(in srgb,'+g.color+' 70%,#fff),'+g.color+' 55%,color-mix(in srgb,'+g.color+' 75%,#000));box-shadow:0 3px 8px color-mix(in srgb,'+g.color+' 45%,transparent),inset 0 1px 0 rgba(255,255,255,.45);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex:none\">'+g.letter+'</span>'+\n        '<div style=\"flex:1;min-width:180px\"><div style=\"font-weight:700;font-size:15px\">'+esc(catLabel(f.categoria,f.tipo))+'</div>'+\n        '<div style=\"font-size:11px;color:var(--text3)\">Grupo da legenda: '+esc(g.label)+' \u2014 letra \\u201C'+g.letter+'\\u201D</div></div>'+\n        '<span style=\"font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:'+status[1]+';padding:4px 10px;border-radius:99px\">'+status[0]+'</span>'+\n      '</div>'+\n      '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">'+\n        fld(\"Militar\",esc(pessoalMilitarLabelOf(f.militar)))+\n        fld(\"Motivo\",esc(f.motivo||catLabel(f.categoria,f.tipo)))+\n        fld(\"In\u00edcio\",ini)+fld(\"T\u00e9rmino\",fim)+\n        fld(\"Dura\u00e7\u00e3o\",dias+\" dia(s)\")+\n        fld(\"Ano de refer\u00eancia\",cycleLabel(pessoalCurCycle))+\n      '</div>'+\n      '<div style=\"display:flex;justify-content:flex-end;gap:8px;margin-top:14px\">'+\n        '<button type=\"button\" class=\"nv-editbtn\" id=\"fdet_edit\">\u270e Editar per\u00edodo</button>'+\n      '</div>';\n    document.getElementById(\"fdet_edit\").onclick=function(){\n      bg.classList.remove(\"open\");\n      openFeriasForm(f.categoria,f.tipo,f);\n    };\n    bg.classList.add(\"open\");\n  }\n  function pctBR(n){return n.toFixed(2).replace(\".\",\",\")+\"%\";}\n  // Classifica um militar por gozo de f\u00e9rias: total (verde), parcial (amarelo), nenhum (vermelho).\n  function feriasBucketOf(r){\n    var g=+r.feriasGozadas||0;\n    if(g<=0)return \"none\";\n    if(g>=FERIAS_TOTAL_DIAS)return \"full\";\n    return \"partial\";\n  }\n  var FERIAS_BUCKET_COLOR={full:\"var(--c-teal)\",partial:\"var(--c-amber)\",none:\"var(--c-red)\"};\n  var FERIAS_BUCKET_LABEL={full:\"Gozaram 100% das f\u00e9rias\",partial:\"Gozaram f\u00e9rias parcialmente\",none:\"Ainda n\u00e3o gozaram f\u00e9rias\"};\n  // Pizza SVG (3 fatias fixas full/partial/none), clic\u00e1vel por fatia \u2014 abre modal com os militares do grupo.\n  function pstatPieSvg(groupKey,rows){\n    var buckets={full:[],partial:[],none:[]};\n    rows.forEach(function(r){buckets[feriasBucketOf(r)].push(r);});\n    var order=[\"full\",\"partial\",\"none\"];\n    var total=rows.length||1;\n    var r=42,cx=50,cy=50,circ=2*Math.PI*r,off=0;\n    var segs=order.map(function(k){\n      var n=buckets[k].length,frac=n/total,len=frac*circ;\n      var seg=n?('<circle class=\"pstat-pie-seg\" data-dept=\"'+esc(groupKey)+'\" data-bucket=\"'+k+'\" cx=\"'+cx+'\" cy=\"'+cy+'\" r=\"'+r+'\" fill=\"none\" stroke=\"'+FERIAS_BUCKET_COLOR[k]+'\" stroke-width=\"16\" stroke-dasharray=\"'+len+' '+(circ-len)+'\" stroke-dashoffset=\"'+(-off)+'\" transform=\"rotate(-90 '+cx+' '+cy+')\"></circle>'):'';\n      off+=len;\n      return seg;\n    }).join(\"\");\n    var FERIAS_BUCKET_SHORT={full:\"Completas\",partial:\"Parciais\",none:\"Pendentes\"};\n    var legend=order.map(function(k){return '<span><i style=\"background:'+FERIAS_BUCKET_COLOR[k]+'\"></i>'+FERIAS_BUCKET_SHORT[k]+\" (\"+buckets[k].length+\")\"+'</span>';}).join(\"\");\n    return '<div class=\"pstat-pie\" data-dept=\"'+esc(groupKey)+'\"><svg viewBox=\"0 0 100 100\" width=\"86\" height=\"86\">'+segs+'</svg><div class=\"pstat-pie-legend\">'+legend+'</div></div>';\n  }\n  function openFeriasBucketModal(groupKey,bucket,rows){\n    var filtered=rows.filter(function(r){return feriasBucketOf(r)===bucket;});\n    var bg=ensureModal(\"pstatBucketBg\",(groupKey?groupKey+\" \u2014 \":\"\")+FERIAS_BUCKET_LABEL[bucket]);\n    var body=bg.querySelector(\".mbody\");\n    body.innerHTML=filtered.length?filtered.map(function(r){\n      return '<div class=\"ps-item\" style=\"padding:8px 4px;border-bottom:1px solid var(--border)\">'+esc(r.nome||\"\u2014\")+\n        '<span style=\"float:right;color:var(--text3);font-size:11px\">'+(+r.feriasGozadas||0)+'/'+FERIAS_TOTAL_DIAS+' dias</span></div>';\n    }).join(\"\"):'<div style=\"font-size:12px;color:var(--text3);font-style:italic;padding:8px 0\">Nenhum militar neste grupo.</div>';\n    bg.classList.add(\"open\");\n  }\n  function bindPstatPies(rowsByGroup){\n    document.querySelectorAll(\"#pessoal_stats .pstat-pie-seg\").forEach(function(el){\n      el.onclick=function(){\n        var d=el.dataset.dept,k=el.dataset.bucket;\n        openFeriasBucketModal(d===\"__dept__\"?\"\":d,k,rowsByGroup[d]);\n      };\n    });\n  }\n  function renderPessoalStats(){\n    var box=document.getElementById(\"pessoal_stats\");\n    if(!box)return;\n    var total=pessoalRows.length;\n    if(!total){box.innerHTML=\"\";return;}\n    var sumGoz=pessoalRows.reduce(function(s,r){return s+(+r.feriasGozadas||0);},0);\n    var deptPct=(sumGoz/(total*FERIAS_TOTAL_DIAS)*100);\n    // Agrupa por divis\u00e3o real dos militares cadastrados na tabela (n\u00e3o pela config), pra garantir\n    // que toda divis\u00e3o presente nos dados (ex.: Divis\u00e3o de Intend\u00eancia) tenha seu KPI + gr\u00e1fico.\n    var byDiv={};\n    pessoalRows.forEach(function(r){\n      var d=r.divisao||\"\";\n      // Chefe do Departamento n\u00e3o forma divis\u00e3o pr\u00f3pria \u2014 s\u00f3 entra no total do Departamento.\n      if(!d||/^Chefe do Departamento/.test(d))return;\n      if(!byDiv[d])byDiv[d]=[];\n      byDiv[d].push(r);\n    });\n    var rowsByGroup={__dept__:pessoalRows};\n    var divKeys=Object.keys(byDiv).sort();\n    divKeys.forEach(function(d){rowsByGroup[d]=byDiv[d];});\n    var deptBlock='<div class=\"pstat-block\"><div class=\"pstat pstat-total\"><span>Departamento</span><b>'+pctBR(deptPct)+'</b></div>'+pstatPieSvg(\"__dept__\",pessoalRows)+'</div>';\n    var divBlocks=divKeys.map(function(d){\n      var rows=byDiv[d],n=rows.length,g=rows.reduce(function(s,r){return s+(+r.feriasGozadas||0);},0);\n      var pct=(g/(n*FERIAS_TOTAL_DIAS)*100);\n      return '<div class=\"pstat-block\"><div class=\"pstat\"><span>'+esc(d)+'</span><b>'+pctBR(pct)+'</b></div>'+pstatPieSvg(d,rows)+'</div>';\n    }).join(\"\");\n    box.innerHTML=deptBlock+divBlocks;\n    bindPstatPies(rowsByGroup);\n  }\n  function pessoalIndisponivelNoDia(nome,ds){return !!dayStatus(nome,ds);}\n  var pessoalCalYM=null; // {y,m} do m\u00eas em navega\u00e7\u00e3o; null = m\u00eas atual\n  function pessoalCalCurYM(){return pessoalCalYM||{y:TODAY.getFullYear(),m:TODAY.getMonth()};}\n  var MESES_LABEL=[\"janeiro\",\"fevereiro\",\"mar\u00e7o\",\"abril\",\"maio\",\"junho\",\"julho\",\"agosto\",\"setembro\",\"outubro\",\"novembro\",\"dezembro\"];\n  function renderPessoalDispCal(){\n    var box=document.getElementById(\"pessoal_disp_cal\");\n    var lbl=document.getElementById(\"pessoal_cal_label\");\n    if(!box)return;\n    var total=pessoalRows.length;\n    var ym=pessoalCalCurYM(),y=ym.y,m=ym.m;\n    if(lbl)lbl.textContent=MESES_LABEL[m]+\"/\"+y;\n    if(!total){box.innerHTML='<div style=\"font-size:11px;color:var(--text3);font-style:italic\">Nenhum militar cadastrado.</div>';return;}\n    var lastDay=new Date(y,m+1,0).getDate();\n    var days=[];\n    for(var d=1;d<=lastDay;d++){\n      var dt=new Date(y,m,d),ds=dstr(dt);\n      var indispo=pessoalRows.filter(function(r){return pessoalIndisponivelNoDia(r.nome||\"\",ds);}).length;\n      days.push({d:d,disp:total-indispo,total:total,isToday:dt.getTime()===TODAY.getTime()});\n    }\n    var max=total;\n    box.innerHTML='<div style=\"display:flex;gap:3px;align-items:flex-end;height:90px\">'+days.map(function(x){\n      var pct=Math.round(x.disp/max*100);\n      var color=pct>=70?\"var(--c-teal)\":(pct>=40?\"var(--c-amber)\":\"var(--c-red)\");\n      return '<div class=\"pessoal-cal-day\" data-d=\"'+x.d+'\" role=\"button\" tabindex=\"0\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer\" title=\"Dia '+x.d+': '+x.disp+'/'+x.total+' dispon\u00edveis \u2014 clique para ver a escala\">'+\n        '<div style=\"width:100%;height:70px;display:flex;align-items:flex-end;background:var(--c-100);border-radius:3px;overflow:hidden'+(x.isToday?';box-shadow:0 0 0 2px var(--c-blue)':'')+'\"><div style=\"width:100%;height:'+pct+'%;background:'+color+'\"></div></div>'+\n        '<span style=\"font-size:8px;color:var(--text3)\">'+x.d+'</span>'+\n      '</div>';\n    }).join(\"\")+'</div>';\n    box.querySelectorAll(\".pessoal-cal-day\").forEach(function(el){\n      el.onclick=function(){pessoalShowDayEscala(new Date(y,m,+el.dataset.d));};\n      el.onkeydown=function(e){if(e.key===\"Enter\"||e.key===\" \")el.click();};\n    });\n  }\n  function pessoalCalNav(delta){\n    var ym=pessoalCalCurYM();\n    var dt=new Date(ym.y,ym.m+delta,1);\n    pessoalCalYM={y:dt.getFullYear(),m:dt.getMonth()};\n    renderPessoalDispCal();\n    renderPessoalOverlapAlert();\n  }\n  /* \u2500\u2500 Alerta de sobreposi\u00e7\u00e3o \u2014 metade ou mais do Departamento indispon\u00edvel no mesmo dia \u2500\u2500 */\n  function pessoalOverlapThreshold(){return Math.max(1,Math.ceil(pessoalRows.length/2));}\n  function renderPessoalOverlapAlert(){\n    var box=document.getElementById(\"pessoal_overlap_alert\");\n    if(!box)return;\n    var total=pessoalRows.length;\n    if(!total){box.innerHTML=\"\";return;}\n    var thr=pessoalOverlapThreshold();\n    var ym=pessoalCalCurYM(),y=ym.y,m=ym.m,lastDay=new Date(y,m+1,0).getDate();\n    var peakDay=null,peakCount=0;\n    for(var d=1;d<=lastDay;d++){\n      var ds=dstr(new Date(y,m,d));\n      var n=pessoalRows.filter(function(r){return pessoalIndisponivelNoDia(r.nome||\"\",ds);}).length;\n      if(n>peakCount){peakCount=n;peakDay=d;}\n    }\n    if(peakCount>=thr){\n      box.innerHTML='<div class=\"ferias-msg warn\" style=\"display:block;margin-bottom:14px\">\u26a0 Sobreposi\u00e7\u00e3o alta em '+peakDay+'/'+String(m+1).padStart(2,\"0\")+': <b>'+peakCount+' de '+total+'</b> militares indispon\u00edveis (limite de aten\u00e7\u00e3o: '+thr+').</div>';\n    }else box.innerHTML=\"\";\n  }\n  /* \u2500\u2500 Militares dispon\u00edveis num dia \u2014 clique no calend\u00e1rio \u2500\u2500 */\n  function pessoalShowDayEscala(dia){\n    var disponiveis=pessoalRows.filter(function(r){return !pessoalIndisponivelNoDia(r.nome||\"\",dstr(dia));});\n    var bg=ensureModal(\"pessoalEscalaBg\",\"Militares dispon\u00edveis \u2014 \"+dia.toLocaleDateString(\"pt-BR\"));\n    var body=bg.querySelector(\".mbody\");\n    if(!disponiveis.length){\n      body.innerHTML='<div style=\"font-size:12px;color:var(--text3);font-style:italic\">Nenhum militar dispon\u00edvel nesse dia.</div>';\n    }else{\n      var ordenados=disponiveis.slice().sort(function(a,b){return(+a.antiguidade||9999)-(+b.antiguidade||9999);});\n      body.innerHTML='<div style=\"font-size:11.5px;color:var(--text3);margin-bottom:10px\">'+ordenados.length+' militares dispon\u00edveis nesse dia (sem f\u00e9rias/afastamento ativos), ordenados por antiguidade.</div>'+\n        '<div class=\"dt-table-wrap\" style=\"margin-bottom:0\"><table class=\"dt-table\"><thead><tr><th>#</th><th>Nome</th><th>Posto/Grad.</th><th>Divis\u00e3o</th><th>Fun\u00e7\u00e3o</th></tr></thead><tbody>'+\n        ordenados.map(function(r,i){return '<tr><td>'+(i+1)+'</td><td>'+esc(r.nome||\"\u2014\")+'</td><td>'+esc(r.posto||\"\u2014\")+'</td><td>'+esc(r.divisao||\"\u2014\")+'</td><td>'+esc(r.funcao||\"\u2014\")+'</td></tr>';}).join(\"\")+\n        '</tbody></table></div>';\n    }\n    bg.classList.add(\"open\");\n  }\n  function refreshPessoal(){pessoalRecalcVacation();renderPessoalTable();renderFeriasTable();renderPessoalStats();renderFeriasLegend();renderFeriasJump();renderYearTabs();renderPessoalCards();renderPessoalDispCal();renderPessoalOverlapAlert();}\n  function cycleLabel(y){return \"DEZ/\"+String(y).slice(2)+\"\u2013NOV/\"+String(y+1).slice(2);}\n  function renderYearTabs(){\n    var box=document.getElementById(\"pessoal_year_tabs\");\n    if(!box)return;\n    box.innerHTML=pessoalCycles.map(function(y){\n      return '<button type=\"button\" class=\"ferias-years-btn'+(y===pessoalCurCycle?\" active\":\"\")+'\" data-y=\"'+y+'\">'+cycleLabel(y)+'</button>';\n    }).join(\"\")+\n      '<button type=\"button\" class=\"hbtn add-year\" id=\"pessoal_addyear\">+ Ano</button>'+\n      (pessoalCycles.length>1?'<button type=\"button\" class=\"hbtn\" id=\"pessoal_delyear\" style=\"background:rgba(168,85,75,.25);border-color:rgba(168,85,75,.5)\">\u2715 Ano</button>':\"\");\n    box.querySelectorAll(\".ferias-years-btn\").forEach(function(b){\n      b.onclick=function(){if(+b.dataset.y!==pessoalCurCycle)switchPessoalCycle(+b.dataset.y);};\n    });\n    var ab=document.getElementById(\"pessoal_addyear\");\n    if(ab)ab.onclick=addPessoalCycle;\n    var db=document.getElementById(\"pessoal_delyear\");\n    if(db)db.onclick=removePessoalCycle;\n  }\n  async function switchPessoalCycle(y){\n    pessoalCurCycle=y;\n    rebuildFeriasRange();\n    PESSOAL_FERIAS_KEY=cycleFeriasKey(pessoalCurCycle);\n    await pessoalLoadFeriasForCurrentCycle();\n    pessoalCleanupPastPrevisoes();\n    refreshPessoal();\n  }\n  async function addPessoalCycle(){\n    var next=pessoalCycles[pessoalCycles.length-1]+1;\n    pessoalCycles.push(next);pessoalCycles.sort(function(a,b){return a-b;});\n    pessoalSaveCycles();\n    await pushKV(\"pessoalPush\",PESSOAL_CYCLES_KEY,pessoalCycles);\n    toast(\"\u2713 Ano \"+cycleLabel(next)+\" adicionado\",\"ok\");\n    await switchPessoalCycle(next);\n  }\n  async function removePessoalCycle(){\n    if(pessoalCycles.length<=1){toast(\"N\u00e3o \u00e9 poss\u00edvel excluir o \u00fanico ano ativo.\",\"info\");return;}\n    if(!confirm(\"Excluir o ano \"+cycleLabel(pessoalCurCycle)+\"? Os lan\u00e7amentos de f\u00e9rias deste ano permanecem salvos, mas a aba deixa de mostr\u00e1-lo.\"))return;\n    var Y=pessoalCurCycle;\n    pessoalCycles=pessoalCycles.filter(function(y){return y!==Y;});\n    pessoalSaveCycles();\n    await pushKV(\"pessoalPush\",PESSOAL_CYCLES_KEY,pessoalCycles);\n    await switchPessoalCycle(pessoalCycles[pessoalCycles.length-1]);\n  }\n  function pessoalMilitarNames(){return pessoalRows.map(function(r){return r.nome;}).filter(Boolean);}\n  function pessoalMilitarLabelOf(nome){var r=pessoalRows.find(function(x){return x.nome===nome;});return r?militarLabel(r):nome;}\n\n  function closeMbg(id){document.getElementById(id).classList.remove(\"open\");}\n  function catLabel(categoria,subtipo){\n    if(categoria===\"ferias\")return subtipo===\"gozo\"?\"F\u00e9rias gozadas\":\"Previs\u00e3o de f\u00e9rias\";\n    if(categoria===\"licenca\"){var at=afastTypeOf(subtipo);return at?at.label:\"Afastamento\";}\n    var t=periodTypeOf(categoria);\n    return t?t.label:categoria;\n  }\n  function updFeriasInfo(){\n    var militar=document.getElementById(\"f_militar\").value;\n    var i=document.getElementById(\"f_inicio\").value,f=document.getElementById(\"f_fim\").value;\n    var diasOut=document.getElementById(\"f_dias\"),msg=document.getElementById(\"f_msg\"),saveBtn=document.getElementById(\"f_save\");\n    var dias=null;\n    if(i&&f){dias=periodDays(i,f);diasOut.value=dias>0?dias+\" dia(s)\":\"Per\u00edodo inv\u00e1lido\";}else diasOut.value=\"\";\n    var isFerias=feriasFormState.categoria===\"ferias\";\n    var isAfastamento=feriasFormState.categoria===\"licenca\";\n    if(!militar){msg.className=\"ferias-msg\";msg.style.display=\"none\";saveBtn.disabled=true;return;}\n    if(isAfastamento){\n      var subtipoEf=effectiveAfastSubtipo(feriasFormState.subtipo,militar,feriasFormState.editId);\n      var at=afastTypeOf(subtipoEf);\n      document.getElementById(\"f_title\").textContent=(feriasFormState.editId?\"Editar \u2014 \":\"Inserir \u2014 \")+at.label;\n      document.getElementById(\"f_motivo\").value=at.label;\n      if(dias===null){msg.style.display=\"none\";saveBtn.disabled=true;return;}\n      if(dias<=0){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=\"Per\u00edodo inv\u00e1lido.\";saveBtn.disabled=true;return;}\n      var usados=diasUsadosAfastamento(militar,subtipoEf,feriasFormState.editId);\n      if(at.semLimite){\n        // sem per\u00edodo m\u00e1ximo estipulado \u2014 s\u00f3 valida que o per\u00edodo \u00e9 positivo (j\u00e1 checado acima)\n      }else if(at.exact){\n        if(usados>0){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=at.label+\" j\u00e1 utilizado(a) por \"+pessoalMilitarLabelOf(militar)+\" \u2014 benef\u00edcio \u00fanico.\";saveBtn.disabled=true;return;}\n        if(dias!==at.dias){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=at.label+\" deve ter exatamente \"+at.dias+\" dia(s) (selecionado: \"+dias+\" dia(s)).\";saveBtn.disabled=true;return;}\n      }else if(at.maxOnce){\n        if(usados>0){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=at.label+\" j\u00e1 utilizado(a) por \"+pessoalMilitarLabelOf(militar)+\" \u2014 benef\u00edcio \u00fanico.\";saveBtn.disabled=true;return;}\n        if(dias>at.dias){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=at.label+\" n\u00e3o pode ultrapassar \"+at.dias+\" dia(s) (selecionado: \"+dias+\" dia(s)).\";saveBtn.disabled=true;return;}\n      }else{\n        var dispA=at.dias-usados;\n        if(dias>dispA){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=pessoalMilitarLabelOf(militar)+\" tem \"+dispA+\" dia(s) dispon\u00edvel(eis) de \"+at.dias+\" para \"+at.label+\", mas o per\u00edodo selecionado soma \"+dias+\" dia(s).\";saveBtn.disabled=true;return;}\n      }\n      msg.className=\"ferias-msg info\";msg.style.display=\"block\";msg.textContent=\"Per\u00edodo selecionado: \"+dias+\" dia(s).\";\n      saveBtn.disabled=false;return;\n    }\n    if(!isFerias){\n      // demais categorias: sem limite de dias, sem restri\u00e7\u00e3o de passado/futuro (regras a definir futuramente)\n      if(dias===null){msg.style.display=\"none\";saveBtn.disabled=true;return;}\n      if(dias<=0){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=\"Per\u00edodo inv\u00e1lido.\";saveBtn.disabled=true;return;}\n      msg.className=\"ferias-msg info\";msg.style.display=\"block\";msg.textContent=\"Per\u00edodo selecionado: \"+dias+\" dia(s).\";\n      saveBtn.disabled=false;return;\n    }\n    var disponivel=diasDisponiveisPara(militar,feriasFormState.editId);\n    if(feriasFormState.subtipo===\"previsao\"&&i&&i<dstr(new Date())){\n      msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=\"Inten\u00e7\u00e3o de f\u00e9rias s\u00f3 pode ser lan\u00e7ada a partir de hoje.\";saveBtn.disabled=true;return;\n    }\n    if(dias===null){\n      msg.className=\"ferias-msg info\";msg.style.display=\"block\";\n      msg.textContent=disponivel+\" dia(s) dispon\u00edvel(eis) de \"+FERIAS_TOTAL_DIAS+\" para \"+pessoalMilitarLabelOf(militar)+\".\";\n      saveBtn.disabled=true;return;\n    }\n    if(dias<=0){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=\"Per\u00edodo inv\u00e1lido.\";saveBtn.disabled=true;return;}\n    if(dias>30){msg.className=\"ferias-msg warn\";msg.style.display=\"block\";msg.textContent=\"Um \u00fanico per\u00edodo n\u00e3o pode ultrapassar 30 dias (selecionado: \"+dias+\" dia(s)). Parcele em per\u00edodos menores.\";saveBtn.disabled=true;return;}\n    if(dias>disponivel){\n      msg.className=\"ferias-msg warn\";msg.style.display=\"block\";\n      msg.textContent=pessoalMilitarLabelOf(militar)+\" tem \"+disponivel+\" dia(s) dispon\u00edvel(eis), mas o per\u00edodo selecionado soma \"+dias+\" dia(s). Ajuste o per\u00edodo.\";\n      saveBtn.disabled=true;return;\n    }\n    msg.className=\"ferias-msg info\";msg.style.display=\"block\";\n    msg.textContent=disponivel+\" dia(s) dispon\u00edvel(eis) \u00b7 per\u00edodo selecionado: \"+dias+\" dia(s).\";\n    saveBtn.disabled=false;\n  }\n  function openFeriasForm(categoria,subtipo,editEntry){\n    var sel=document.getElementById(\"f_militar\");\n    sel.innerHTML=pessoalMilitarNames().map(function(n){return '<option value=\"'+esc(n)+'\">'+esc(n)+'</option>';}).join(\"\");\n    document.getElementById(\"f_title\").textContent=(editEntry?\"Editar \u2014 \":\"Inserir \u2014 \")+catLabel(categoria,subtipo);\n    document.getElementById(\"f_inicio\").value=editEntry?editEntry.inicio:\"\";\n    document.getElementById(\"f_fim\").value=editEntry?editEntry.fim:\"\";\n    // Motivo \u00e9 sempre o tipo selecionado nas janelas anteriores \u2014 preenchido automaticamente, n\u00e3o edit\u00e1vel.\n    document.getElementById(\"f_motivo\").value=catLabel(categoria,subtipo);\n    if(editEntry)sel.value=editEntry.militar;\n    document.getElementById(\"f_inicio\").min=(categoria===\"ferias\"&&subtipo===\"previsao\")?dstr(new Date()):\"\";\n    document.getElementById(\"f_del\").style.display=editEntry?\"inline-flex\":\"none\";\n    feriasFormState={categoria:categoria,subtipo:subtipo,editId:editEntry?editEntry.id:null};\n    updFeriasInfo();\n    document.getElementById(\"fmbg\").classList.add(\"open\");\n  }\n  // Escolha de tipo (Destaque/Previs\u00e3o/Gozadas/LTS-Dispensa/Licen\u00e7a); Destaque e LTS/Dispensa abrem uma\n  // segunda janela para o subtipo, os demais j\u00e1 mapeiam direto para uma categoria/subtipo de pessoalFerias.\n  function resolveGroupChoice(group,mode){\n    if(group===\"destaque\"){\n      openTwoChoice(\"Destaque \u2014 curso ou comiss\u00e3o?\",\"Destaque curso\",\"Destaque comiss\u00e3o\",function(pick){\n        applyGroupPick(pick===0?\"curso\":\"comissao\",\"periodo\",mode);\n      });\n    }else if(group===\"medica\"){\n      openTwoChoice(\"LTS ou Dispensa M\u00e9dica?\",\"LTS\",\"Dispensa M\u00e9dica\",function(pick){\n        applyGroupPick(pick===0?\"lts\":\"dispensa\",\"periodo\",mode);\n      });\n    }else if(group===\"previsao\")applyGroupPick(\"ferias\",\"previsao\",mode);\n    else if(group===\"gozo\")applyGroupPick(\"ferias\",\"gozo\",mode);\n    else if(group===\"licenca\")openAfastSubtypePicker(mode);\n  }\n  function openAfastSubtypePicker(mode){\n    var list=document.getElementById(\"fa_list\");\n    list.innerHTML=AFASTAMENTO_TYPES.filter(function(t){return t.key!==\"maternidade_prorrogacao\";}).map(function(t){\n      return '<button type=\"button\" class=\"ferias-cat-pick\" data-key=\"'+t.key+'\"><span class=\"ferias-cat-dot\" style=\"background:#4a7dc4\"></span>'+esc(t.label)+'</button>';\n    }).join(\"\");\n    list.querySelectorAll(\"button\").forEach(function(b){\n      b.onclick=function(){closeMbg(\"fabg\");applyGroupPick(\"licenca\",b.dataset.key,mode);};\n    });\n    document.getElementById(\"fabg\").classList.add(\"open\");\n  }\n  // No fluxo de edi\u00e7\u00e3o, \"maternidade\" tamb\u00e9m deve trazer os per\u00edodos de prorroga\u00e7\u00e3o j\u00e1 lan\u00e7ados.\n  function feriasMatchesEdit(f){\n    if(f.categoria!==feriasEditTipo)return false;\n    if(feriasEditTipo!==\"ferias\"&&feriasEditTipo!==\"licenca\")return true;\n    if(f.tipo===feriasEditSub)return true;\n    return feriasEditTipo===\"licenca\"&&feriasEditSub===\"maternidade\"&&f.tipo===\"maternidade_prorrogacao\";\n  }\n  function applyGroupPick(categoria,subtipo,mode){\n    if(mode===\"insert\")openFeriasForm(categoria,subtipo,null);\n    else{feriasEditTipo=categoria;feriasEditSub=subtipo;openFeriasStep2();}\n  }\n  function openTwoChoice(title,labelA,labelB,resolve){\n    document.getElementById(\"fe1s_title\").textContent=title;\n    var a=document.getElementById(\"fe1s_a\"),b=document.getElementById(\"fe1s_b\");\n    a.textContent=labelA;b.textContent=labelB;\n    a.onclick=function(){closeMbg(\"fe1sbg\");resolve(0);};\n    b.onclick=function(){closeMbg(\"fe1sbg\");resolve(1);};\n    document.getElementById(\"fe1sbg\").classList.add(\"open\");\n  }\n  function openInsertTypePicker(){\n    var list=document.getElementById(\"ft_list\");\n    list.innerHTML=GROUPS.map(function(g){\n      return '<button type=\"button\" class=\"ferias-cat-pick\" data-grp=\"'+g.key+'\"><span class=\"ferias-cat-dot\" style=\"background:'+g.color+'\"></span>'+esc(g.label)+'</button>';\n    }).join(\"\");\n    list.querySelectorAll(\"button\").forEach(function(b){\n      b.onclick=function(){closeMbg(\"ftbg\");resolveGroupChoice(b.dataset.grp,\"insert\");};\n    });\n    document.getElementById(\"ftbg\").classList.add(\"open\");\n  }\n  function openFeriasStep2(){\n    closeMbg(\"fe1bg\");closeMbg(\"fe1sbg\");\n    var match=pessoalFerias.filter(feriasMatchesEdit);\n    var names=Array.from(new Set(match.map(function(f){return f.militar;})));\n    document.getElementById(\"fe2_title\").textContent=\"Selecione o militar (\"+catLabel(feriasEditTipo,feriasEditSub)+\")\";\n    var list=document.getElementById(\"fe2_list\");\n    if(!names.length){\n      list.innerHTML='<div style=\"color:var(--text3);font-size:13px;padding:8px 0\">Nenhum militar com '+esc(catLabel(feriasEditTipo,feriasEditSub))+' cadastrada.</div>';\n    }else{\n      list.innerHTML=names.map(function(n){return '<button type=\"button\" class=\"brestore\" data-militar=\"'+esc(n)+'\" style=\"text-align:left\">'+esc(pessoalMilitarLabelOf(n))+'</button>';}).join(\"\");\n      list.querySelectorAll(\"button\").forEach(function(b){b.onclick=function(){openFeriasStep3(b.dataset.militar);};});\n    }\n    document.getElementById(\"fe2bg\").classList.add(\"open\");\n  }\n  function openFeriasStep3(militar){\n    closeMbg(\"fe2bg\");\n    document.getElementById(\"fe3_title\").textContent=pessoalMilitarLabelOf(militar)+\" \u2014 \"+catLabel(feriasEditTipo,feriasEditSub);\n    var entries=pessoalFerias.filter(function(f){return feriasMatchesEdit(f)&&f.militar===militar;});\n    var isPrevisao=(feriasEditTipo isual: transi\u00e7\u00e3o entre abas (menu lateral e meses) \u2500\u2500\n   Somente cosm\u00e9tico: calcula dist\u00e2ncia entre a aba de origem e a de\n   destino e aplica uma classe de anima\u00e7\u00e3o proporcional \u00e0 intensidade.\n   N\u00e3o interfere em switchAppView/renderAll \u2014 apenas observa os cliques. */\n(function(){\n  var NAV_ORDER=[\"config\",\"agenda\",\"navios\",\"clg\",\"horas\",\"pessoal\",\"ppss\",\"garagem\"];\n  var navFromIdx=1;\n  document.addEventListener(\"pointerdown\",function(e){\n    var item=e.target.closest(\"#appnav .nav-item\");\n    if(!item)return;\n    var cur=document.querySelector(\"#appnav .nav-item.active\");\n    navFromIdx=cur?NAV_ORDER.indexOf(cur.dataset.view):0;\n  },true);\n  document.addEventListener(\"click\",function(e){\n    var item=e.target.closest(\"#appnav .nav-item\");\n    if(!item)return;\n    var toIdx=NAV_ORDER.indexOf(item.dataset.view);\n    requestAnimationFrame(function(){\n      var visible=null;\n      document.querySelectorAll(\".wrap[id^='view']\").forEach(function(v){if(v.style.display!==\"none\")visible=v;});\n      if(!visible)return;\n      var dist=Math.abs(toIdx-navFromIdx),maxDist=NAV_ORDER.length-1;\n      var intensity=Math.min(1,dist/maxDist),dir=toIdx>=navFromIdx?1:-1;\n      visible.style.setProperty(\"--nav-dir\",dir);\n      visible.style.setProperty(\"--nav-intensity\",intensity.toFixed(3));\n      visible.classList.remove(\"view-enter\");\n      void visible.offsetWidth;\n      visible.classList.add(\"view-enter\");\n    });\n  });\n\n  var monthFromIdx=new Date().getMonth()+1;\n  document.addEventListener(\"pointerdown\",function(e){\n    var item=e.target.closest(\"#tabs .tab\");\n    if(!item)return;\n    var cur=document.querySelector(\"#tabs .tab.active\");\n    monthFromIdx=cur?+cur.dataset.m:monthFromIdx;\n  },true);\n  document.addEventListener(\"click\",function(e){\n    var item=e.target.closest(\"#tabs .tab\");\n    if(!item)return;\n    var toIdx=+item.dataset.
