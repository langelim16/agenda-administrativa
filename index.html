<html>
<head>
  <meta charset="utf-8">
  <title>Agenda Administrativa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2f3a44; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; left: 50%; bottom: 14%; transform: translateX(-50%); font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #cfd8e3; background: transparent; padding: 0; z-index: 10000; opacity: 0; animation: __bundler_fade_in 0.15s ease 0.4s forwards; }
    @keyframes __bundler_fade_in { to { opacity: 1; } }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(130% 120% at 50% 12%, #3d5c81 0%, #33507a 45%, #263a58 100%); z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;background:repeating-linear-gradient(to right,var(--c-100) 0,var(--c-100) calc(100%/12 - 1px),var(--border) calc(100%/12 - 1px),var(--border) calc(100%/12));box-shadow:inset 0 0 0 1px var(--isl-border);position:relative}\n.nv-tl-seg{height:100%;position:relative;box-shadow:inset -1px 0 0 rgba(0,0,0,.12);transition:filter .15s,transform .15s;transform-origin:center}\n.nv-tl-seg:hover{filter:brightness(1.14);transform:scaleY(1.18);z-index:3;box-shadow:inset 0 0 0 1px rgba(255,255,255,.5),0 2px 6px rgba(0,0,0,.18)}\n.nv-tl-seg.nv-tl-clickable{cursor:pointer}\n@media(max-width:700px){.nv-tl-wrap{--tl-namew:96px}}\n/* \u2500\u2500 Gr\u00e1ficos de linha (CLG \u00b7 Horas de Funcionamento) \u2500\u2500 */\n.lchart-root{position:relative}\n.lchart-root svg{overflow:visible}\n.cl-series{transition:opacity .2s}\n.lchart-root:has(.cl-series:hover) .cl-series:not(:hover){opacity:.28}\n.cl-line{animation:lchartDraw 1.15s var(--ease-out) forwards}\n@keyframes lchartDraw{to{stroke-dashoffset:0}}\n.cl-area{opacity:0;animation:lchartFade .7s .35s ease forwards}\n@keyframes lchartFade{to{opacity:.9}}\n.cl-dot{transition:transform .15s var(--ease-out);transform-box:fill-box;transform-origin:center;cursor:pointer}\n.cl-dot:hover{transform:scale(1.8)}\n.cl-series:hover .cl-line{stroke-width:3.2}\n.cl-endpoint{animation:cl-pulse 1.8s ease-in-out infinite}\n@keyframes cl-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.35)}}\n.lchart-grid-line{stroke:var(--border);stroke-dasharray:2 4}\n.lchart-axis{fill:var(--text3);font-family:var(--mono,monospace)}\n.lchart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}\n.lchart-legend-item{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text2);padding:3px 9px 3px 6px;border-radius:99px;background:var(--c-100);transition:background .15s}\n.lchart-legend-item:hover{background:var(--isl-border)}\n.lchart-legend-swatch{width:9px;height:9px;border-radius:50%;flex:none}\n.lchart-single{d resh-v3\">\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CAMADA VISUAL v3 \u2014 ilhas com profundidade, LEDs realistas,\n   menu agrupado e abas com indicador deslizante. Somente est\u00e9tica.\n   \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\n/* \u2500\u2500 A. Tokens de eleva\u00e7\u00e3o (ilhas) \u2500\u2500 */\n:root{\n  --isl-border:color-mix(in srgb,var(--c-200) 70%,transparent);\n  --isl-in:inset 0 1px 0 rgba(255,255,255,.65);\n  --isl-sh:0 1px 2px rgba(24,30,38,.05),0 5px 12px rgba(24,30,38,.06),0 18px 40px -10px rgba(24,30,38,.14);\n  --isl-sh-hover:0 2px 4px rgba(24,30,38,.06),0 10px 22px rgba(24,30,38,.08),0 30px 60px -12px rgba(24,30,38,.2);\n}\n[data-theme=\"dark\"]{\n  --isl-border:rgba(255,255,255,.07);\n  --isl-in:inset 0 1px 0 rgba(255,255,255,.06);\n  --isl-sh:0 1px 2px rgba(0,0,0,.4),0 6px 14px rgba(0,0,0,.32),0 22px 48px -10px rgba(0,0,0,.52);\n  --isl-sh-hover:0 2px 4px rgba(0,0,0,.44),0 12px 26px rgba(0,0,0,.4),0 34px 66px -12px rgba(0,0,0,.6);\n}\n\n/* \u2500\u2500 B. Tabelas como ilhas: eleva\u00e7\u00e3o em camadas + respiro \u2500\u2500 */\n.nv-table-wrap,.dt-table-wrap,.ferias-wrap,.tl-wrap,.nv-tl-wrap,.hm-wrap{\n  border:1px solid var(--isl-border);\n  border-radius:var(--r-xl);\n  box-shadow:var(--isl-sh),var(--isl-in);\n  margin-bottom:20px;\n  transition:box-shadow .35s var(--ease-out);\n}\n.nv-table-wrap:hover,.dt-table-wrap:hover,.ferias-wrap:hover,.tl-wrap:hover,.nv-tl-wrap:hover,.hm-wrap:hover{\n  box-shadow:var(--isl-sh-hover),var(--isl-in);\n}\n.nv-table th,.dt-table th{padding:9px 8px;letter-spacing:.5px}\n.nv-table td,.dt-table td{padding:8px 7px}\n.nv-table th,.nv-table td,.dt-table th,.dt-table td{overflow-wrap:anywhere}\n/* Comiss\u00f5es/Relat\u00f3rio de Operacionalidade: colunas crescem pelo conte\u00fado em vez de quebrar\n   linha \u2014 table-layout:auto (ver navRenderComissoes/navRenderOperReport) some com a quebra feia\n   em telas estreitas; o wrapper .dt-table-wrap j\u00e1 tem overflow-x:auto pra rolagem horizontal. */\n.dt-table.dt-nowrap th,.dt-table.dt-nowrap td{white-space:nowrap;overflow-wrap:normal}\n.nv-table tbody tr td,.dt-table tbody tr td{transition:background-color .16s ease}\n.nv-table tbody tr:hover td,.dt-table tbody tr:hover td{background:color-mix(in srgb,var(--c-blue) 6%,transparent)}\n\n/* Cart\u00f5es, KPIs e listas seguem o mesmo vocabul\u00e1rio de ilha */\n.nv-card,.stats-card,.ovw-card,.ps-item,.kpi,.spotcard,.task,.tl-legend-top,.pstat{\n  border-color:var(--isl-border);\n  box-shadow:var(--isl-sh),var(--isl-in);\n}\n.nv-card,.stats-card,.ovw-card{border-radius:var(--r-xl)}\n.task:hover,.spotcard:hover,.nv-card:hover,.stats-card:hover{box-shadow:var(--isl-sh-hover),var(--isl-in)}\n.spot-section{box-shadow:var(--isl-sh)}\n\n/* \u2500\u2500 C. LEDs da Garagem: componente f\u00edsico (aro, c\u00fapula, brilho, halo) \u2500\u2500 */\n.fleet-led{\n  top:10px;left:10px;width:15px;height:15px;z-index:2;\n  background:\n    radial-gradient(circle at 32% 26%,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 30%),\n    radial-gradient(circle at 50% 40%,color-mix(in srgb,var(--led-c) 55%,#fff) 0%,var(--led-c) 52%,color-mix(in srgb,var(--led-c) 68%,#000) 92%);\n  box-shadow:\n    inset 0 -2px 3px rgba(0,0,0,.38),\n    inset 0 1px 1.5px rgba(255,255,255,.6),\n    0 0 0 2.5px #23282e,\n    0 0 0 3.5px rgba(255,255,255,.16),\n    0 2px 4px rgba(0,0,0,.35),\n    0 0 6px 1px color-mix(in srgb,var(--led-c) 70%,transparent),\n    0 0 14px 4px color-mix(in srgb,var(--led-c) 42%,transparent),\n    0 0 26px 9px color-mix(in srgb,var(--led-c) 20%,transparent);\n  animation:ledBreath 2.6s ease-in-out infinite,ledFlicker 6.5s linear infinite;\n  transition:transform .22s var(--spring);\n}\n.fleet-led::before{\n  content:\"\";position:absolute;left:18%;top:8%;width:48%;height:36%;border-radius:50%;\n  background:linear-gradient(rgba(255,255,255,.92),rgba(255,255,255,0));\n  pointer-events:none;\n}\n.fleet-led::after{\n  content:\"\";position:absolute;inset:56% 20% 6% 20%;border-radius:50%;\n  background:radial-gradient(ellipse at 50% 100%,rgba(255,255,255,.38),transparent 72%);\n  pointer-events:none;\n}\n.fleet-led:hover{transform:scale(1.35)}\n.fleet-led:active{transform:scale(1.08)}\n@keyframes ledBreath{\n  0%,100%{box-shadow:\n    inset 0 -2px 3px rgba(0,0,0,.38),inset 0 1px 1.5px rgba(255,255,255,.6),\n    0 0 0 2.5px #23282e,0 0 0 3.5px rgba(255,255,255,.16),0 2px 4px rgba(0,0,0,.35),\n    0 0 6px 1px color-mix(in srgb,var(--led-c) 70%,transparent),\n    0 0 14px 4px color-mix(in srgb,var(--led-c) 42%,transparent),\n    0 0 26px 9px color-mix(in srgb,var(--led-c) 20%,transparent)}\n  50%{box-shadow:\n    inset 0 -2px 3px rgba(0,0,0,.38),inset 0 1px 1.5px rgba(255,255,255,.6),\n    0 0 0 2.5px #23282e,0 0 0 3.5px rgba(255,255,255,.16),0 2px 4px rgba(0,0,0,.35),\n    0 0 8px 2px color-mix(in srgb,var(--led-c) 85%,transparent),\n    0 0 20px 7px color-mix(in srgb,var(--led-c) 52%,transparent),\n    0 0 36px 14px color-mix(in srgb,var(--led-c) 28%,transparent)}\n}\n@keyframes ledFlicker{\n  0%,100%{filter:brightness(1)}\n  2.8%{filter:brightness(1.16)}\n  3.4%{filter:brightness(.97)}\n  4.2%{filter:brightness(1.1)}\n  5%{filter:brightness(1)}\n  47%{filter:brightness(1)}\n  47.6%{filter:brightness(1.12)}\n  48.4%{filter:brightness(1)}\n  76%{filter:brightness(1)}\n  76.5%{filter:brightness(.95)}\n  77.2%{filter:brightness(1.08)}\n  78%{filter:brightness(1)}\n}\n\n/* \u2500\u2500 D. Menu lateral: grupos, divisores e indicador ativo \u2500\u2500 */\n.appnav{padding:14px 0;gap:6px}\n.nav-sep{width:42px;height:1px;background:rgba(255,255,255,.14);margin:5px 0;flex-shrink:0}\n.nav-grp{font-size:7px;letter-spacing:2.4px;text-transform:uppercase;color:rgba(255,255,255,.34);font-weight:600;margin:1px 0 2px;font-family:var(--sans)}\n.nav-item{position:relative}\n.nav-item::before{\n  content:\"\";position:absolute;left:-7px;top:50%;translate:0 -50%;\n  width:3.5px;height:0;border-radius:99px;background:#fff;opacity:0;\n  box-shadow:0 0 8px rgba(255,255,255,.7);\n  transition:height .32s var(--spring),opacity .2s ease;\n}\n.nav-item.active::before{height:26px;opacity:.95}\n@media(max-width:700px){\n  .nav-sep,.nav-grp{display:none}\n  .nav-item::before{left:50%;top:auto;bottom:-3px;translate:-50% 0;width:0;height:3.5px}\n  .nav-item.active::before{width:22px;height:3.5px}\n}\n\n/* \u2500\u2500 E. Abas com indicador deslizante (knob) \u2500\u2500 */\n.tabs,.view-toggle{position:relative}\n.seg-knob{\n  position:absolute;top:0;left:0;z-index:0;border-radius:99px;pointer-events:none;\n  background:color-mix(in srgb,var(--header-bg) 78%,transparent);\n  backdrop-filter:blur(10px) saturate(1.7);-webkit-backdrop-filter:blur(10px) saturate(1.7);\n  box-shadow:0 3px 10px color-mix(in srgb,var(--header-bg) 38%,transparent),inset 0 1px 0 rgba(255,255,255,.22);\n  transition:transform .42s var(--spring),width .42s var(--spring),height .25s ease,opacity .2s ease;\n  will-change:transform,width;\n}\n.tabs.has-knob .tab,.view-toggle.has-knob .vtbtn{position:relative;z-index:1}\n.tabs.has-knob .tab.active,.view-toggle.has-knob .vtbtn.active{\n  background:transparent!important;box-shadow:none!important;\n  backdrop-filter:none;-webkit-backdrop-filter:none;animation:none;\n}\n\n/* \u2500\u2500 F. Foco vis\u00edvel consistente \u2500\u2500 */\nbutton:focus-visible,.tab:focus-visible,.nav-item:focus-visible{outline:2px solid var(--ring);outline-offset:2px}\n</style>\n<style id=\"visual-refresh-4k\">\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   REFINO 4K \u2014 nitidez de renderiza\u00e7\u00e3o, sombras em camadas e\n   cores com volume (aspecto 3D). Camada puramente visual.\n   \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nhtml{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}\n\n/* \u2500\u2500 KPIs: superf\u00edcie com gradiente sutil, sombra em camadas e halo da cor no hover \u2500\u2500 */\n.kpi{\n  background:linear-gradient(180deg,color-mix(in srgb,#fff 45%,var(--surface)),var(--surface) 52%,color-mix(in srgb,var(--kpi-c) 5%,var(--surface)));\n  box-shadow:0 1px 2px rgba(38,42,46,.07),0 3px 8px rgba(38,42,46,.06),inset 0 1px 0 color-mix(in srgb,#fff 55%,transparent);\n  transition:transform .24s var(--spring),box-shadow .28s ease,border-color .2s ease;\n}\n.kpi::before{\n  width:4px;\n  background:linear-gradient(180deg,color-mix(in srgb,var(--kpi-c) 62%,#fff),var(--kpi-c) 45%,color-mix(in srgb,var(--kpi-c) 72%,#000));\n  box-shadow:1px 0 6px color-mix(in srgb,var(--kpi-c) 40%,transparent);\n}\n.kpi:hover{\n  transform:translateY(-4px) scale(1.02);\n  border-color:color-mix(in srgb,var(--kpi-c) 4 o local, persiste no localStorage. */\nif(!window.storage){\n  window.storage={\n    get:async function(k){var v=localStorage.getItem(k);return v==null?null:{key:k,value:v};},\n    set:async function(k,v){localStorage.setItem(k,String(v));},\n    delete:async function(k){localStorage.removeItem(k);},\n    list:async function(prefix){return Object.keys(localStorage).filter(function(k){return!prefix||k.indexOf(prefix)===0;}).map(function(k){return{key:k,value:localStorage.getItem(k)};});}\n  };\n}\nfunction sbHeaders(extra){var h={apikey:SB_KEY,Authorization:\"Bearer \"+SB_KEY};if(extra)Object.assign(h,extra);return h;}\nfunction bkSynced(){return bk===\"supabase\";}\n\n\n// Supabase \u00e9 a \u00fanica fonte de verdade \u2014 se falhar, cai pro modo local (sem sync).\nasync function initBk(){\n  if(BACKEND_OVERRIDE===\"local\"){bk=\"local\";return;}\n  await initBkSupabase();\n}\nasync function initBkSupabase(){\n  try{\n    var r=await Promise.race([fetch(SB_TABLE+\"?select=key&limit=1\",{headers:sbHeaders()}),new Promise(function(_,j){setTimeout(function(){j(new Error(\"timeout\"));},5000);})]);\n    if(!r.ok)throw new Error(\"HTTP \"+r.status);\n    bk=\"supabase\";\n  }catch(e){console.warn(\"Supabase indispon\u00edvel:\",e.message);bk=\"local\";}\n}\n\nasync function sbGetDoc(){\n  if(dc)return dc;\n  dc={};\n  try{\n    var r=await fetch(SB_TABLE+\"?select=key,value,updated_at\",{headers:sbHeaders()});\n    if(!r.ok)return dc;\n    var rows=await r.json();\n    rows.forEach(function(row){dc[row.key]=row.value;docUpdateTimes[row.key]=row.updated_at;});\n  }catch(e){}\n  return dc;\n}\n\nasync function sbFlushKey(k){\n  try{\n    var body=[{key:k,value:dc[k],updated_at:new Date().toISOString()}];\n    var r=await fetch(SB_TABLE,{method:\"POST\",headers:sbHeaders({\"Content-Type\":\"application/json\",Prefer:\"resolution=merge-duplicates,return=representation\"}),body:JSON.stringify(body)});\n    if(r.ok){var j=await r.json();if(j[0])docUpdateTimes[k]=j[0].updated_at;}\n    sbBumpMeta();\n  }catch(e){console.error(\"sbFlushKey\",k,e);}\n}\nfunction schedFlushKey(k){\n  clearTimeout(flushTimers[k]);\n  flushTimers[k]=setTimeout(function(){delete flushTimers[k];sbFlushKey(k);},400);\n}\n\nasync function svs(k,v){\n  var val=typeof v===\"string\"?v:JSON.stringify(v);\n  if(bk===\"supabase\"){if(!dc)await sbGetDoc();dc[k]=val;schedFlushKey(k);return;}\n  try{await window.storage.set(k,val);}catch(e){}\n}\nasync function gts(k){\n  if(bk===\"supabase\"){var d=await sbGetDoc();return d[k]!==undefined?d[k]:null;}\n  try{var r=await window.storage.get(k);return(r&&r.value)?r.value:null;}catch(e){return null;}\n}\nasync function gtj(k){var v=await gts(k);try{return v?JSON.parse(v):null;}catch(e){return null;}}\n\n/* \u2500\u2500 Sync entre abas/dispositivos: doc/linha-sentinela \"_meta\" (1 leitura) sinaliza se algo mudou em\n   QUALQUER chave; s\u00f3 faz a listagem completa quando o sentinela indica mudan\u00e7a real. Evita poll cego\n   da cole\u00e7\u00e3o inteira a cada ciclo (esgotava cota de leitura na Firestore; no Supabase, estouraria o\n   limite de egress do free tier do mesmo jeito se reaplicado sem essa otimiza\u00e7\u00e3o). */\nvar lastSeenMetaTs=0,metaBumpTimer=null;\nfunction sbBumpMeta(){\n  clearTimeout(metaBumpTimer);\n  metaBumpTimer=setTimeout(function(){\n    var ts=Date.now();\n    fetch(SB_TABLE,{method:\"POST\",headers:sbHeaders({\"Content-Type\":\"application/json\",Prefer:\"resolution=merge-duplicates,return=minimal\"}),body:JSON.stringify([{key:\"_meta\",value:String(ts),updated_at:new Date().toISOString()}])})\n      .then(function(r){if(r.ok){lastSeenMetaTs=ts;rtBroadcastSync();}})\n      .catch(function(){});\n  },300);\n}\n// Aplica o conte\u00fado j\u00e1 mesclado em dc/docUpdateTimes ao estado do app \u2014 comum a Firebase e Supabase.\nfunction applyDcToState(){\n  function p(k){try{return dc[k]?JSON.parse(dc[k]):null;}catch(e){return null;}}\n  var ns=p(K.st);if(ns){ovStatus=ns;var _mg=false;Object.keys(ovStatus).forEach(function(k){if(/^o\\|[^|]+$/.test(k)){ovStatus[k.replace(/^(o\\|[^|]+)$/,\"$1|0\")]=ovStatus[k];delete ovStatus[k];_mg=true;}});if(_mg)svs(K.st,ovStatus);}\n  var nh=p(K.sh);if(nh)ovShips=nh;\n  var ne=p(K.ed);if(ne)ovEdit=ne;\n  var nu=p(K.us);if(nu)userTasks=nu;\n  var nd=p(K.dn);if(nd)ovDone=nd;\n  var nn=p(K.np);if(nn)ovNup=nn;\n  var nb=p(K.sb);if(nb)ovSubsids=nb;\n  var nst=p(K.sub);if(nst)ovSubtasks=nst;\n  var nt=p(K.tsh);if(nt)ovTaskShips=nt;\n  var no=p(K.ord);if(no)ovOrder=no;\n  var nie=p(K.ie);if(nie)ovInstEdit=nie;\n  var nsp=p(K.sp);if(nsp)spots=nsp;\n  var yy=p(K.yrs);if(yy&&yy.length)activeYears=yy;\n  var cc=p(K.cf);if(cc){cfg=Object.assign({},CFG0,cc);SUBUNITS=(cfg.subunidades||[]).slice();}\n  renderAll();\n  if(navRemoteHook)navRemoteHook(dc);\n}\nasync function sbFetchFullAndApply(){\n  try{\n    var r=await fetch(SB_TABLE+\"?select=key,value,updated_at\",{headers:sbHeaders()});\n    if(!r.ok)return;\n    var rows=await r.json();\n    var changed=false;\n    if(!dc)dc={};\n    rows.forEach(function(row){\n      var k=row.key;\n      if(k===\"_meta\")return;\n      if(flushTimers[k])return;\n      if(docUpdateTimes[k]===row.updated_at)return;\n      docUpdateTimes[k]=row.updated_at;\n      dc[k]=row.value;\n      changed=true;\n    });\n    if(changed)applyDcToState();\n  }catch(e){}\n}\nasync function checkMetaTs(){\n  var r=await fetch(SB_TABLE+\"?select=value&key=eq._meta&limit=1\",{headers:sbHeaders()});\n  if(!r.ok)return 0;\n  var rows=await r.json();\n  return +((rows[0]&&rows[0].value)||0);\n}\n/* \u2500\u2500 Sync instant\u00e2neo entre dispositivos: canal Broadcast do Supabase Realtime (WebSocket).\n   N\u00e3o depende de replica\u00e7\u00e3o/publication na tabela \u2014 os clientes s\u00f3 trocam um sinal \"sync\" entre\n   si; quem recebe busca o doc completo (sbFetchFullAndApply). O polling do _meta continua como\n   fallback (rede corporativa bloqueando WebSocket, Realtime fora do ar etc.). Protocolo Phoenix\n   falado \u00e0 m\u00e3o pra manter o artefato sem depend\u00eancias externas. \u2500\u2500 */\nvar rtWs=null,rtWsRef=2,rtWsOpen=false,rtWsRetry=1000,rtHbTimer=null;\nvar RT_TOPIC=\"realtime:aa_sync\";\nfunction rtWsSend(o){try{if(rtWsOpen)rtWs.send(JSON.stringify(o));}catch(e){}}\nfunction rtBroadcastSync(){rtWsSend({topic:RT_TOPIC,event:\"broadcast\",payload:{type:\"broadcast\",event:\"sync\",payload:{ts:Date.now()}},ref:String(rtWsRef++)});}\nfunction startWs(){\n  if(bk!==\"supabase\"||typeof WebSocket===\"undefined\")return;\n  try{rtWs=new WebSocket(SB_URL.replace(\"https://\",\"wss://\")+\"/realtime/v1/websocket?apikey=\"+SB_KEY+\"&vsn=1.0.0\");}catch(e){return;}\n  rtWs.onopen=function(){\n    rtWsOpen=true;rtWsRetry=1000;\n    rtWs.send(JSON.stringify({topic:RT_TOPIC,event:\"phx_join\",payload:{config:{broadcast:{self:false}}},ref:\"1\"}));\n    clearInterval(rtHbTimer);\n    rtHbTimer=setInterval(function(){rtWsSend({topic:\"phoenix\",event:\"heartbeat\",payload:{},ref:String(rtWsRef++)});},25000);\n  };\n  rtWs.onmessage=async function(ev){\n    try{\n      var m=JSON.parse(ev.data);\n      if(m.event===\"broadcast\"&&m.payload&&m.payload.event===\"sync\")await sbFetchFullAndApply();\n    }catch(e){}\n  };\n  rtWs.onclose=function(){rtWsOpen=false;clearInterval(rtHbTimer);setTimeout(startWs,rtWsRetry);rtWsRetry=Math.min(rtWsRetry*2,30000);};\n  rtWs.onerror=function(){try{rtWs.close();}catch(e){}};\n}\nfunction startRT(){\n  if(rtActive||bk!==\"supabase\")return;\n  rtActive=true;\n  startWs();\n  var VISIBLE_POLL_MS=20000,HIDDEN_POLL_MS=60000; // aba em 2\u00ba plano: poll bem mais espa\u00e7ado\n  function poll(){\n    setTimeout(async function(){\n      if(!document.hidden){\n        try{\n          var ts=await checkMetaTs();\n          if(ts>lastSeenMetaTs){lastSeenMetaTs=ts;await sbFetchFullAndApply();}\n        }catch(e){}\n      }\n      poll();\n    },document.hidden?HIDDEN_POLL_MS:VISIBLE_POLL_MS);\n  }\n  poll();\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   ABA: AGENDA \u2014 constantes, estado, calend\u00e1rio, tarefas, modais\n   \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2500\u2500 CONSTANTES \u2500\u2500 */\nvar TODAY=(function(){var d=new Date();d.setHours(0,0,0,0);return d;})();\nvar CUR_YEAR=TODAY.getFullYear();\nvar MAX_YEARS=10;\nvar MONTHS=[\"JAN\",\"FEV\",\"MAR\",\"ABR\",\"MAI\",\"JUN\",\"JUL\",\"AGO\",\"SET\",\"OUT\",\"NOV\",\"DEZ\"];\nvar ML=[\"Janeiro\",\"Fevereiro\",\"Mar\u00e7o\",\"Abril\",\"Maio\",\"Junho\",\"Julho\",\"Agosto\",\"Setembro\",\"Outubro\",\"Novembro\",\"Dezembro\"];\nvar KL={MENSAL:\"Mensal\",SEMANAL:\"Semanal\",ANUAL:\"Anual\",DIVERSO:\"Diverso\",ESPORADICA:\"Espor\u00e1dica\"};\nvar WD=[\"Dom\",\"Seg\",\"Ter\",\"Qua\",\"Qui\",\"Sex\",\"S\u00e1b\"];\nvar SIT={venc:{l:\"Vencida\",c:\"pill-venc\",dot:\"dot-red\"},prox:{l:\"Vence \u22647d\",c:\"pill-prox\",dot:\"dot-amber\"},fut:{l:\"A vencer\",c:\"pill-fut\",dot:\"dot-blue\"},ok:{l:\"Conclu\u00edda\",c:\"pill-ok\",dot:\"dot-teal\"},sem:{l:\"Sem prazo\",c:\"pill-sem\",dot:\"dot-grey\"}};\nvar HPRE=[\"#2f3a44\",\"#2b3a30\",\"#3a3340\",\"#4a3330\",\"#2c3e44\",\"#33363b\",\"#3a4654\",\"#2f3d34\",\"#4a3a4a\",\"#5a4a36\"];\nvar CFG0={om:\"\",departamento:\"\",divisoes:[],subunidades:[],labelProprio:\"Tarefas da Divis\u00e3o\",labelSubsidio:\"Subs\u00eddios das Unidades Subordinadas\",headerColor: n normHdr(s){return String(s||\"\").toLowerCase().normalize(\"NFD\").replace(/[\\u0300-\\u036f]/g,\"\").replace(/[^a-z0-9]/g,\"\");}\nfunction openImporter(o){\n  var bg=document.getElementById(\"impBg\");\n  if(!bg)return;\n  document.getElementById(\"impTitle\").textContent=\"Importar planilha \u2014 \"+o.label;\n  document.getElementById(\"impFile\").value=\"\";\n  document.getElementById(\"impPaste\").value=\"\";\n  document.getElementById(\"impMapWrap\").innerHTML=\"\";\n  document.getElementById(\"impPreviewWrap\").innerHTML=\"\";\n  document.getElementById(\"impConfirm\").disabled=true;\n  var parsed=null;\n  function process(text){\n    parsed=parseCsv(text);\n    if(!parsed.headers.length){toast(\"N\u00e3o foi poss\u00edvel ler a planilha (CSV vazio).\",\"info\");return;}\n    var mapWrap=document.getElementById(\"impMapWrap\");\n    mapWrap.innerHTML=o.cols.map(function(c){\n      var guess=parsed.headers.findIndex(function(h){return normHdr(h)===normHdr(c.title)||normHdr(h)===normHdr(c.key);});\n      return '<div class=\"imp-map-row\"><span>'+esc(c.title)+'</span><select data-key=\"'+c.key+'\"><option value=\"\">\u2014 ignorar \u2014</option>'+\n        parsed.headers.map(function(h,i){return '<option value=\"'+i+'\"'+(i===guess?\" selected\":\"\")+'>'+esc(h)+'</option>';}).join(\"\")+\n      '</select></div>';\n    }).join(\"\");\n    renderPreview();\n    mapWrap.querySelectorAll(\"select\").forEach(function(sel){sel.onchange=renderPreview;});\n    document.getElementById(\"impConfirm\").disabled=false;\n  }\n  function currentMap(){\n    var map={};\n    document.getElementById(\"impMapWrap\").querySelectorAll(\"select\").forEach(function(sel){if(sel.value!==\"\")map[sel.dataset.key]=+sel.value;});\n    return map;\n  }\n  function renderPreview(){\n    if(!parsed)return;\n    var map=currentMap();\n    var cols=o.cols.filter(function(c){return map[c.key]!==undefined;});\n    var prevRows=parsed.rows.slice(0,15);\n    document.getElementById(\"impPrev nd(function(x){return String(x.id)===String(id);});\n    if(t&&t.dates&&t.dates[idx])return{y:t.dates[idx].y,m:t.dates[idx].m};\n    return null;\n  }\n  var parts=key.split(\"|\");\n  if(parts.length>=3){\n    var y=parseInt(parts[1]),m=parseInt(parts[2]);\n    if(!isNaN(y)&&!isNaN(m))return{y:y,m:m};\n  }\n  if(parts.length===2){\n    var y2=parseInt(parts[1]);\n    if(!isNaN(y2)){\n      var id2=parts[0];\n      var t2=tasks.find(function(x){return String(x.id)===String(id2);});\n      if(t2&&t2.kind===\"ANUAL\")return{y:y2,m:t2.month};\n    }\n  }\n  return null;\n}\nfunction focusTask(key){\n  // Determina o m\u00eas/ano da tarefa e muda a aba se necess\u00e1rio\n  var inst=findI(key);\n  if(!inst){\n    var ym=deriveYM(key);\n    if(ym){curYear=ym.y;curMonth=ym.m;}\n  } else {\n    if(inst.deadline){\n      var nm=inst.deadline.getMonth()+1;\n      var ny=inst.deadline.getFullYear();\n      if(ny!==curYear||nm!==curMonth){curYear=ny;curMonth=nm;}\n    }\n  }\n  // Muda para lista, limpa filtros externos, define foco por key\n  viewMode=\"lista\";\n  document.querySelectorAll(\".vtbtn\").forEach(function(b){b.classList.toggle(\"active\",b.dataset.v===\"lista\");});\n  kpiFilter=null;catFilter=\"ALL\";assuntoFilter=\"\";\n  document.getElementById(\"q\").value=\"\";\n  focusedKey=key;\n  openPanels.clear();\n  openPanels.add(key);\n  renderAll();\n  setTimeout(function(){\n    var el=document.querySelector('.task[data-key=\"'+key+'\"]');\n    if(el){\n      el.scrollIntoView({behavior:\"smooth\",block:\"center\"});\n      el.style.transition=\"box-shadow .3s\";\n      el.style.boxShadow=\"0 0 0 3px var(--c-blue)\";\n    }\n  },180);\n}\nfunction mkSep(txt){return'<div style=\"display:flex;align-items:center;gap:10px;margin:12px 0 8px;\"><hr style=\"flex:1;border:none;border-top:2px dashed var(--border)\"><span style=\"font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);white-space:nowrap\">'+txt+'</span><hr style=\"flex:1;border:none;border-top:2px dashed var(--border)\"></div>';}\nfunction mkEmptyMonth(tipo,mes){return'<div class=\"empty-month\">N\u00e3o h\u00e1 '+tipo+' para o m\u00eas de '+mes+'.</div>';}\n\nfunction renderBody(inst){\n  var rows=inst.filter(passF).filter(function(i){return statusOf(i)!==\"EXCLUIDA\";});\n  // Ordena sempre por prazo. A ordem manual (ovOrder) s\u00f3 desempata quando os dois\n  // prazos caem no mesmo dia \u2014 assim, ao mudar o prazo de uma tarefa, ela assume\n  // sua nova posi\u00e7\u00e3o cronol\u00f3gica (n\u00e3o fica presa por ordem manual de dias diferentes).\n  rows.sort(function(a,b){\n    var ta=a.deadline?a.deadline.getTime():Infinity,tb=b.deadline?b.deadline.getTime():Infinity;\n    var sameDay=a.deadline&&b.deadline&&a.deadline.toDateString()===b.deadline.toDateString();\n    if(sameDay){\n      var oa=ovOrder[a.key],ob=ovOrder[b.key];\n      if(oa!==undefined&&ob!==undefined&&oa!==ob)return oa-ob;\n    }\n    return ta-tb;\n  });\n\n  if(viewMode===\"cal\"){renderCal(rows);bindEv();return;}\n  if(viewMode===\"tl\"){renderTimeline(rows);bindEv();return;}\n  if(viewMode===\"hm-mes\"){renderHeatMapMes(rows);bindEv();return;}\n  if(viewMode===\"hm-ano\"){renderHeatMapAno(rows);bindEv();return;}\n\n  /* \u2500\u2500 MODO LISTA \u2500\u2500 */\n  if((recFilter===\"ANUAL\"||recFilter===\"DIVERSO\"||recFilter===\"ESPORADICA\")&&rows.length>=0){\n    var tipoNome=recFilter===\"ANUAL\"?\"tarefas anuais\":recFilter===\"DIVERSO\"?\"prazos diversos\":\"tarefas espor\u00e1dicas\";\n    var curr=rows.filter(function(i){return i.deadline&&i.deadline.getMonth()+1===curMonth;});\n    var rest=rows.filter(function(i){return!(i.deadline&&i.deadline.getMonth()+1===curMonth);});\n    var html=\"\";\n    if(curr.length){html+=curr.map(taskHTML).join(\"\");}\n    else if(rows.length){html+=mkEmptyMonth(tipoNome,ML[curMonth-1]);}\n    if(rest.length){\n      html+=mkSep(\"Demais meses do ano\");\n      html+=rest.map(taskHTML).join(\"\");\n    }\n    document.getElementById(\"body\").innerHTML=html||'<div class=\"empty\">Nenhuma tarefa encontrada</div>';\n  } else {\n    document.getElementById(\"body\").innerHTML=rows.length?rows.map(taskHTML).join(\"\"):'<div class=\"empty\">Nenhuma tarefa encontrada</div>';\n  }\n  bindEv();bindTDrag();\n}\n\n/* \u2500\u2500 CALEND\u00c1RIO MENSAL \u2500\u2500 */\nfunction renderCal(allInst){\n  var Y=curYear,M=curMonth;\n  var firstDay=new Date(Y,M-1,1).getDay();\n  var daysInMonth=new Date(Y,M,0).getDate();\n  // Monta mapa dia\u2192tarefas usando allInst (que inclui meses adjacentes via passagem de par\u00e2metro)\n  var map={};\n  allInst.forEach(function(i){\n    if(!i.deadline)return;\n    if(i.deadline.getFullYear()===Y&&i.deadline.getMonth()+1===M){\n      var d=i.deadline.getDate();\n      if(!map[d])map[d]=[];\n      map[d].push(i);\n    }\n  });\n  var dows=[\"Dom\",\"Seg\",\"Ter\",\"Qua\",\"Qui\",\"Sex\",\"S\u00e1b\"];\n  var todayD=(TODAY.getFullYear()===Y&&TODAY.getMonth()+1===M)?TODAY.getDate():null;\n  var totalTasks=allInst.filter(function(i){return i.deadline&&i.deadline.getFullYear()===Y&&i.deadline.getMonth()+1===M;}).length;\n  var html='<div class=\"cal-wrap\">';\n  html+='<div class=\"cal-month-hdr\"><h3>'+ML[M-1]+' de '+Y+'</h3><small>'+totalTasks+' tarefa'+(totalTasks!==1?'s':'')+' neste m\u00eas</small></div>';\n  html+='<div class=\"cal-grid\">'+dows.map(function(d){return'<div class=\"cal-dow\">'+d+'</div>';}).join(\"\");\n  // c\u00e9lulas vazias\n  for(var b=0;b<firstDay;b++)html+='<div class=\"cal-day other\"></div>';\n  for(var d=1;d<=daysInMonth;d++){\n    var isToday=(d===todayD);\n    var dow=new Date(Y,M-1,d).getDay();\n    var isWknd=(dow===0||dow===6);\n    var items=map[d]||[];\n    var hasTasks=items.length>0;\n    var isDaySelected=(dayFilter===d);\n    var cls=\"cal-day\"+(isToday?\" today\":\"\")+(isWknd?\" weekend\":\"\")+(hasTasks?\" has-tasks\":\"\")+(isDaySelected?\" day-selected\":\"\");\n    var clearBadge=isDaySelected?'<span class=\"cal-day-clear\" data-clear=\"1\">\u00d7</span>':'' ;\n    var dn='<div class=\"cal-dn\">'+d+clearBadge+'</div>';\n    var visItems=isDaySelected?items:items.slice(0,3);\n    var chips=visItems.map(function(i){\n      var s=isDone(i)?\"ok\":sit(i);\n      return'<button class=\"cal-chip '+s+'\" data-key=\"'+esc(i.key)+'\" title=\"'+esc(i.tarefa)+'\">'+esc(i.tarefa.substring(0,20))+'</button>';\n    }).join(\"\");\n    var more=(!isDaySelected&&items.length>3)?'<div class=\"cal-more\" data-day=\"'+d+'\">'+'+'+(items.length-3)+' mais</div>':'' ;\n    html+='<div class=\"'+cls+'\" data-calday=\"'+d+'\">'+dn+chips+more+'</div>';\n  }\n  var total=firstDay+daysInMonth;var rem=total%7?7-(total%7):0;\n  for(var a=0;a<rem;a++)html+='<div class=\"cal-day other\"></div>';\n  html+=\"</div>\";\n  html+='<div class=\"cal-legend\"><div class=\"cal-legend-item\"><div class=\"cal-legend-dot\" style=\"background:var(--c-teal)\"></div>Conclu\u00edda</div><div class=\"cal-legend-item\"><div class=\"cal-legend-dot\" style=\"background:var(--c-red)\"></div>Vencida</div><div class=\"cal-legend-item\"><div class=\"cal-legend-dot\" style=\"background:var(--c-amber)\"></div>Vence \u22647d</div><div class=\"cal-legend-item\"><div class=\"cal-legend-dot\" style=\"background:var(--c-blue)\"></div>A vencer</div></div>';\n  html+='</div>';\n  document.getElementById(\"body\").innerHTML=html;\n  bindCalDayClicks();\n}\n\nfunction bindCalDayClicks(){\n  document.querySelectorAll(\".cal-chip\").forEach(function(btn){\n    btn.onclick=function(e){e.stopPropagation();focusTask(btn.dataset.key);};\n  });\n  document.querySelectorAll(\".cal-day[data-calday]\").forEach(function(cell){\n    cell.onclick=function(e){\n      if(e.target.closest(\".cal-chip\"))return;\n      var d=+cell.dataset.calday;\n      if(e.target.dataset.clear){\n        dayFilter=null;\n      } else if(e.target.closest(\".cal-more\")){\n        dayFilter=d;\n      } else {\n        dayFilter=(dayFilter===d)?null:d;\n      }\n      renderCal(document._lastInst||[]);\n      bindCalDayClicks();\n    };\n  });\n}\n\n/* \u2500\u2500 TIMELINE 30 DIAS \u2500\u2500 */\nfunction buildInstRange(dateFrom,dateTo){\n  // Gera inst\u00e2ncias para todos os meses cobertos pelo intervalo\n  var months={};\n  var d=new Date(dateFrom);\n  while(d<=dateTo){\n    var k=d.getFullYear()+\"-\"+(d.getMonth()+1);\n    months[k]={y:d.getFullYear(),m:d.getMonth()+1};\n    d.setDate(d.getDate()+1);\n  }\n  var tasks=allBase().map(eff);\n  var inst=[];\n  var seen={};\n  Object.values(months).forEach(function(ym){\n    var Y=ym.y,M=ym.m;\n    tasks.forEach(function(t){\n      var key=null,deadline=null;\n      if(t.kind===\"MENSAL\"){key=t.id+\"|\"+Y+\"|\"+M;deadline=ruleDate(t.dayrule,Y,M);}\n      else if(t.kind===\"SEMANAL\"){var wd=t.weekday!==undefined?t.weekday:5;wkDates(wd,Y,M).forEach(function(dt,i){var wk=t.id+\"|\"+Y+\"|\"+M+\"|w\"+i;if(!seen[wk]){seen[wk]=1;var mk2=applyInstEd(mk(t,wk,dt,{wIdx:i}));if(mk2.deadline&&mk2.deadline>=dateFrom&&mk2.deadline<=dateTo)inst.push(mk2);}});return;}\n      else if(t.kind===\"ANUAL\"&&t.month===M){key=t.id+\"|\"+Y;deadline=new Date(Y,M-1,t.day);}\n      else if((t.kind===\"DIVERSO\"||t.kind===\"ESPORADICA\")&&t.dates&&t.dates.length){\n        t.dates.forEach(function(dt,i){\n          if(dt.y===Y&&dt.m===M){\n            var pk=(t.kind===\"DIVERSO\"?\"o\":\"esp\")+\"|\"+t.id+\"|\"+i;\n            if(!seen[pk]){seen[pk]=1;var mk3=applyInstEd(mk(t,pk,new Date(dt.y,dt.m-1,dt.d)));if(mk3.deadline&&mk3.deadline>=dateFrom&&mk3.deadline<=dateTo)inst.push(mk3);}\n          }\n        });\n        return;\n      }\n      if(key&&deadline&&!seen[key]){seen[key]=1;var mk4=applyInstEd(mk(t,key,deadline));if(mk4.deadline&&mk4.deadline>=dateFrom&&mk4.deadline<=dateTo)inst.push(mk4);}\n    });\n  });\n  return inst;\n}\n\nfunction renderTimeline(rows){\n  var today=new Date(TODAY);today.setHours(0,0,0,0);\n  var dateEnd=new Date(today);dateEnd.setDate(today.getDate()+29);dateEnd.setHours(23,59,59,999);\n  var rangeInst=buildInstRange(today,dateEnd).filter(function(i){return statusOf(i)!==\"EXCLUIDA\";});\n  rangeInst=rangeInst.filter(function(i){\n    if(catFilter!==\"ALL\"&&i.cat!==catFilter)return false;\n    if(profile!==\"ALL\"&&i.divisao!==profile)return false;\n    if(!document.getElementById(\"f_done\").checked&&isDone(i))return false;\n    return true;\n  });\n  rangeInst.sort(function(a,b){return(a.deadline?a.deadline.getTime():Infinity)-(b.deadline?b.deadline.getTime():Infinity);});\n\n  if(!rangeInst.length){\n    document.getElementById(\"body\").innerHTML='<div class=\"empty\">Nenhuma tarefa com prazo nos pr\u00f3ximos 30 dias</div>';\n    return;\n  }\n\n  var days30=[];\n  for(var x=0;x<30;x++){var dd=new Date(today);dd.setDate(today.getDate()+x);days30.push(dd);}\n\n  var fmt=function(d){return d.getDate().toString().padStart(2,\"0\")+\"/\"+(d.getMonth()+1).toString().padStart(2,\"0\");};\n  var isWeekend=function(d){var dw=d.getDay();return dw===0||dw===6;};\n  var isMonthStart=function(d,idx){return idx>0&&d.getDate()===1;};\n  var tlMark=function(i){return i.cat===\"NAVIOS\"?\"S\":\"P\";};\n\n  var html='<div class=\"tl-legend-top\">';\n  html+='<span class=\"tl-leg-item\"><span class=\"tl-leg-dot\" style=\"background:var(--c-amber)\"></span>Vence \u22647d</span>';\n  html+='<span class=\"tl-leg-item\"><span class=\"tl-leg-dot\" style=\"background:var(--c-blue)\"></span>A vencer</span>';\n  html+='<span class=\"tl-leg-sep\"><b>P</b>&nbsp;=&nbsp;Pr\u00f3pria&nbsp;&nbsp;<b>S</b>&nbsp;=&nbsp;Subs\u00eddio</span>';\n  html+='</div>';\n  html+='<div class=\"tl-wrap\"><div class=\"tl-header\"><div class=\"tl-label-col\">Tarefa</div><div class=\"tl-days\">';\n  days30.forEach(function(d,idx){\n    var cls=\"tl-day-head\"+(d.getTime()===today.getTime()?\" today\":\"\")+(isWeekend(d)?\" weekend\":\"\")+(isMonthStart(d,idx)?\" month-start\":\"\");\n    var lbl=isMonthStart(d,idx)?'<span class=\"tl-month-label\">'+MONTHS[d.getMonth()]+'</span>':'';\n    var iso=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();\n    html+='<div class=\"'+cls+'\" data-date=\"'+iso+'\" style=\"cursor:pointer\">'+lbl+fmt(d)+'</div>';\n  });\n  html+=\"</div></div>\";\n\n  var dotColors={ok:\"var(--c-teal)\",venc:\"var(--c-red)\",prox:\"var(--c-amber)\",fut:\"var(--c-blue)\",sem:\"var(--text3)\"};\n  var groups=[],groupByRowKey={};\n  rangeInst.forEach(function(i){\n    var dl=new Date(i.deadline);\n    if(isNaN(dl.getTime()))return;\n    dl.setHours(0,0,0,0);\n    var diffDl=Math.round((dl-today)/86400000);\n    var s=isDone(i)?\"ok\":sit(i);\n    var rowKey=i.id;\n    var g=groupByRowKey[rowKey];\n    if(!g){g={tarefa:i.tarefa,occurrences:[]};groupByRowKey[rowKey]=g;groups.push(g);}\n    g.occurrences.push({key:i.key,diff:diffDl,s:s,tarefa:i.tarefa,cat:i.cat});\n  });\n  groups.forEach(function(g){\n    g.occurrences.sort(function(a,b){return a.diff-b.diff;});\n  });\n  groups.sort(function(a,b){return a.occurrences[0].diff-b.occurrences[0].diff;});\n\n  groups.forEach(function(g){\n    var first=g.occurrences[0];\n    var dotColor=dotColors[first.s]||\"var(--text3)\";\n    html+='<div class=\"tl-row\" data-key=\"'+esc(first.key)+'\"><div class=\"tl-name\" data-tarefa=\"'+esc(g.tarefa)+'\"><div class=\"tl-dot\" style=\"background:'+dotColor+'\"></div>'+esc(g.tarefa.substring(0,30))+'</div><div class=\"tl-cells\">';\n    var occByDiff={};\n    g.occurrences.forEach(function(o){occByDiff[o.diff]=o;});\n    days30.forEach(function(d,idx){\n      var isToday=(idx===0);\n      var diff=Math.round((d-today)/86400000);\n      var occ=occByDiff[diff];\n      var cls=\"tl-cell\"+(isToday?\" today\":\"\")+(isWeekend(d)?\" weekend\":\"\")+(isMonthStart(d,idx)?\" month-start\":\"\");\n      var marker=occ?'<div class=\"tl-marker '+occ.s+'\" title=\"'+esc(occ.tarefa)+'\" data-mkey=\"'+esc(occ.key)+'\">'+tlMark(occ)+'</div>':\"\";\n      var todayLine=isToday?'<div class=\"tl-today-line\"></div>':\"\";\n      html+='<div class=\"'+cls+'\">'+marker+todayLine+'</div>';\n    });\n    html+=\"</div></div>\";\n  });\n  html+=\"</div>\";\n  document.getElementById(\"body\").innerHTML=html;\n  // Bolinha individual \u2192 focusTask\n  document.querySelectorAll(\".tl-marker[data-mkey]\").forEach(function(mk){\n    mk.onclick=function(e){e.stopPropagation();focusTask(mk.dataset.mkey);};\n  });\n  // Coluna Tarefa \u2192 lista filtrada por nome\n  document.querySelectorAll(\".tl-name[data-tarefa]\").forEach(function(nm){\n    nm.onclick=function(e){\n      e.stopPropagation();\n      var q=nm.dataset.tarefa;\n      viewMode=\"lista\";\n      document.querySelectorAll(\".vtbtn\").forEach(function(b){b.classList.toggle(\"active\",b.dataset.v===\"lista\");});\n      focusedKey=null;dayFilter=null;kpiFilter=null;\n      document.getElementById(\"q\").value=q;\n      renderAll();\n    };\n  });\n  // Dia no cabe\u00e7alho \u2192 lista filtrada por dia\n  document.querySelectorAll(\".tl-day-head[data-date]\").forEach(function(dh){\n    dh.onclick=function(){\n      var parts=dh.dataset.date.split(\"-\");\n      var y=+parts[0],m=+parts[1],d=+parts[2];\n      viewMode=\"lista\";\n      document.querySelectorAll(\".vtbtn\").forEach(function(b){b.classList.toggle(\"active\",b.dataset.v===\"lista\");});\n      focusedKey=null;kpiFilter=null;\n      document.getElementById(\"q\").value=\"\";\n      curYear=y;curMonth=m;dayFilter=d;\n      renderAll();\n    };\n  });\n}\n\n/* \u2500\u2500 HEATMAP MENSAL \u2500\u2500 */\n/* \u2500\u2500 HEATMAP CORES VERMELHO \u2500\u2500 */\nfunction hmRedColor(cnt,max){\n  if(cnt===0)return\"var(--c-100)\";\n  var ratio=cnt/Math.max(max,1);\n  if(ratio<=0.25)return\"rgba(180,40,30,.18)\";\n  if(ratio<=0.5)return\"rgba(180,40,30,.42)\";\n  if(ratio<=0.75)return\"rgba(180,40,30,.68)\";\n  return\"rgba(180,40,30,.92)\";\n}\nfunction hmRedTC(cnt,max){\n  if(cnt===0)return\"var(--text3)\";\n  var ratio=cnt/Math.max(max,1);\n  return ratio>0.4?\"#fff\":\"rgba(120,20,15,1)\";\n}\n/* Normaliza por z-score: retorna valor 0-1 com base em mean/stdev */\nfunction hmZNorm(cnt,mean,stdev){\n  if(stdev<0.01)return cnt>0?0.5:0;\n  var z=(cnt-mean)/stdev;\n  // Clamp z em [-2,2] e mapeia para [0,1]\n  z=Math.max(-2,Math.min(2,z));\n  return(z+2)/4;\n}\nfunction hmRedColorZ(z){\n  // z: 0=m\u00ednimo (branco), 1=m\u00e1ximo (vermelho escuro)\n  if(z<=0)return\"var(--c-100)\";\n  if(z<=0.25)return\"rgba(220,100,80,.25)\";\n  if(z<=0.5)return\"rgba(200,60,40,.5)\";\n  if(z<=0.75)return\"rgba(180,35,20,.75)\";\n  return\"rgba(160,20,10,.9)\";\n}\nfunction hmRedTCZ(z){return z>0.45?\"#fff\":\"rgba(120,20,15,1)\";}\n\nfunction hmLegendRed(top){\n  var html='<div class=\"hm-legend\">';\n  html+='<span class=\"hm-legend-item\"><span class=\"hm-legend-box\" style=\"background:var(--c-100)\"></span>0</span>';\n  html+='<span class=\"hm-legend-item\"><span class=\"hm-legend-box\" style=\"background:rgba(220,100,80,.25)\"></span>Baixo</span>';\n  html+='<span class=\"hm-legend-item\"><span class=\"hm-legend-box\" style=\"background:rgba(200,60,40,.5)\"></span>M\u00e9dio</span>';\n  html+='<span class=\"hm-legend-item\"><span class=\"hm-legend-box\" style=\"background:rgba(180,35,20,.75)\"></span>Alto</span>';\n  html+='<span class=\"hm-legend-item\"><span class=\"hm-legend-box\" style=\"background:rgba(160,20,10,.9)\"></span>M\u00e1ximo</span>';\n  html+='</div>';\n  return html;\n}\n\nfunction renderHeatMapMes(allInst){\n  var Y=curYear,M=curMonth;\n  var firstDay=new Date(Y,M-1,1).getDay();\n  var daysInMonth=new Date(Y,M,0).getDate();\n  var todayD=(TODAY.getFullYear()===Y&&TODAY.getMonth()+1===M)?TODAY.getDate():null;\n  var map={};\n  allInst.forEach(function(i){\n    if(!i.deadline)return;\n    if(i.deadline.getFullYear()===Y&&i.deadline.getMonth()+1===M){\n      var d=i.deadline.getDate();\n      map[d]=(map[d]||0)+1;\n    }\n  });\n  var maxCnt=Math.max.apply(null,Object.values(map).concat([1]));\n  var dows=[\"Dom\",\"Seg\",\"Ter\",\"Qua\",\"Qui\",\"Sex\",\"S\u00e1b\"];\n  var html='<div class=\"hm-wrap\">';\n  html+='<div class=\"hm-title\">'+ML[M-1]+' de '+Y+' \u2014 HeatMap Mensal</div>';\n  html+=hmLegendRed();\n  html+='<div class=\"hm-grid-mes\">';\n  dows.forEach(function(d){html+='<div class=\"hm-dow\">'+d+'</div>';});\n  for(var b=0;b<firstDay;b++)html+='<div class=\"hm-day other\"></div>';\n  for(var d=1;d<=daysInMonth;d++){\n    var cnt=map[d]||0;\n    var isToday=(d===todayD);\n    var bg=hmRedColor(cnt,maxCnt);\n    var tc=hmRedTC(cnt,maxCnt);\n    html+='<div class=\"hm-day'+(isToday?\" today\":\"\")+(cnt>0?\" hm-day-has\":\"\")+'\" data-day=\"'+d+'\" style=\"background:'+bg+';color:'+tc+'\" title=\"'+cnt+' tarefa'+(cnt!==1?\"s\":\"\")+'\"><span class=\"hm-day-num\">'+d+'</span>'+(cnt>0?'<span class=\"hm-day-cnt\">'+cnt+'</span>':'')+'</div>';\n  }\n  html+='</div>';\n  html+='</div>';\n  document.getElementById(\"body\").innerHTML=html;\n  // Click dia -> lista filtrada por dia\n  document.querySelectorAll(\".hm-day[data-day]\").forEach(function(cell){\n    cell.onclick=function(){\n      var d=+cell.dataset.day;\n      if(!d)return;\n      viewMode=\"lista\";\n      document.querySelectorAll(\".vtbtn\").forEach(function(b){b.classList.toggle(\"active\",b.dataset.v===\"lista\");});\n      focusedKey=null;kpiFilter=null;\n      document.getElementById(\"q\").value=\"\";\n      dayFilter=d;\n      renderAll();\n    };\n  });\n}\n\n/* \u2500\u2500 HEATMAP ANUAL (z-score por m\u00eas) \u2500\u2500 */\nfunction renderHeatMapAno(allInst){\n  var Y=curYear;\n  var yearInst=allYrInst(Y).filter(function(i){return statusOf(i)!==\"EXCLUIDA\";});\n  yearInst=yearInst.filter(function(i){\n    if(profile!==\"ALL\"&&i.divisao!==profile)return false;\n    if(catFilter!==\"ALL\"&&i.cat!==catFilter)return false;\n    if(!document.getElementById(\"f_done\").checked&&isDone(i))return false;\n    return true;\n  });\n  var map={};\n  for(var m=1;m<=12;m++)map[m]=0;\n  yearInst.forEach(function(i){\n    if(!i.deadline)return;\n    if(i.deadline.getFullYear()===Y){\n      var m=i.deadline.getMonth()+1;\n      map[m]=(map[m]||0)+1;\n    }\n  });\n  var vals=Object.values(map);\n  var mean=vals.reduce(function(a,b){return a+b;},0)/vals.length;\n  var stdev=Math.sqrt(vals.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/vals.length);\n  var html='<div class=\"hm-wrap\">';\n  html+='<div class=\"hm-title\">'+Y+' \u2014 HeatMap Anual</div>';\n  html+=hmLegendRed();\n  html+='<div style=\"font-size:9px;color:var(--text3);margin-bottom:8px\">M\u00e9dia: '+mean.toFixed(1)+' tarefas/m\u00eas | Desvio padr\u00e3o: '+stdev.toFixed(1)+'</div>';\n  html+='<div class=\"hm-grid-ano\">';\n  for(var m=1;m<=12;m++){\n    var cnt=map[m];\n    var z=hmZNorm(cnt,mean,stdev);\n    var bg=hmRedColorZ(z);\n    var tc=hmRedTCZ(z);\n    var isCurMonth=(Y===curYear&&m===curMonth);\n    html+='<div class=\"hm-month-cell\" data-month=\"'+m+'\" style=\"background:'+bg+';color:'+tc+(isCurMonth?';border:2px solid var(--c-blue)':'') +'\" title=\"'+ML[m-1]+': '+cnt+' tarefas\">';\n    html+='<span class=\"hm-month-name\">'+ML[m-1].substring(0,3)+'</span>';\n    html+='<span class=\"hm-month-cnt\">'+cnt+'</span>';\n    html+='</div>';\n  }\n  html+='</div>';\n  html+='</div>';\n  document.getElementById(\"body\").innerHTML=html;\n  // Click mes -> lista filtrada por mes\n  document.querySelectorAll(\".hm-month-cell[data-month]\").forEach(function(cell){\n    cell.onclick=function(){\n      var m=+cell.dataset.month;\n      if(!m)return;\n      viewMode=\"lista\";\n      document.querySelectorAll(\".vtbtn\").forEach(function(b){b.classList.toggle(\"active\",b.dataset.v===\"lista\");});\n      focusedKey=null;kpiFilter=null;dayFilter=null;\n      document.getElementById(\"q\").value=\"\";\n      curMonth=m;\n      renderAll();\n    };\n  });\n}\n\n/* Trava global de sele\u00e7\u00e3o durante qualquer drag (HTML5) \u2014 evita selecionar texto no trajeto */\ndocument.addEventListener(\"dragstart\",function(){docume  Operando com restri\u00e7\u00e3o\"};\n  function navParseDate(s){\n    var m=String(s||\"\").trim().match(/^(\\d{1,2})\\/(\\d{1,2})(?:\\/(\\d{2,4}))?/);\n    if(!m)return null;\n    var d=+m[1],mo=+m[2]-1,y=m[3]?+m[3]:CUR_YEAR;\n    if(y<100)y+=2000;\n    if(mo<0||mo>11||d<1||d>31)return null;\n    var dt=new Date(y,mo,d);dt.setHours(0,0,0,0);\n    return isNaN(dt.getTime())?null:dt;\n  }\n  function navPrevAlert(n){\n    var dt=navParseDate(n.previsao);\n    if(!dt)return\"\";\n    var diff=Math.round((dt-TODAY)/86400000);\n    if(diff<0)return\"over\";\n    if(diff<=7)return\"warn\";\n    return\"\";\n  }\n  function navTrackStatusChanges(before){\n    var bmap={};(before||[]).forEach(function(s){bmap[s.id]=s;});\n    navShips.forEach(function(s){\n      if(!s.stHist||!s.stHist.length){s.stHist=[{st:s.condef||\"\",ts:nowISO()}];return;}\n      var b=bmap[s.id];\n      var prev=b?(b.condef||\"\"):(s.stHist[s.stHist.length-1].st||\"\");\n      if(prev!==(s.condef||\"\"))s.stHist.push({st:s.condef||\"\",ts:nowISO()});\n    });\n  }\n  function navDaysInStatus(s){\n    var h=s.stHist;\n    if(!h||!h.length)return null;\n    var last=h[h.length-1];\n    if((last.st||\"\")!==(s.condef||\"\"))return 0;\n    var t0=new Date(last.ts);t0.setHours(0,0,0,0);\n    return Math.max(0,Math.round((TODAY-t0)/86400000));\n  }\n  /* Cache local dos PPSS (mesma chave da aba PPSS) para exibir/gerir v\u00ednculos restri\u00e7\u00e3o\u2194PPSS */\n  var navPpssCache=[];\n  async function navLoadPpss(){\n    var p=null;\n    try{p=await gtj(\"aa_ppss_v1\");}catch(e){}\n    if(!p||!p.length){try{p=JSON.parse(localStorage.getItem(\"aa_ppss_v1\"));}catch(e){}}\n    navPpssCache=(p&&p.length)?p:[];\n  }\n  function navPpssById(id){return navPpssCache.find(function(r){return r.id===id;})||null;}\n  function normNm(s){return String(s||\"\").toLowerCase().normalize(\"NFD\").replace(/[^a-z0-9]/g,\"\");}\n  // Restri\u00e7\u00e3o/Prazo passaram a admitir m\u00faltiplas linhas (uma restri\u00e7\u0 ;\n      }\n    });\n  }\n  function navEnsureModal(id,title){\n    var bg=document.getElementById(id);\n    if(bg){bg.querySelector(\".mh h3\").textContent=title;return bg;}\n    bg=document.createElement(\"div\");bg.className=\"mbg\";bg.id=id;\n    bg.innerHTML='<div class=\"modal wide\"><div class=\"mh\"><h3></h3><button class=\"mx\" data-close=\"1\">\u2715</button></div><div class=\"mbody\"></div></div>';\n    document.body.appendChild(bg);\n    bg.querySelector(\".mh h3\").textContent=title;\n    bg.addEventListener(\"click\",function(e){if(e.target===bg||e.target.dataset.close)bg.classList.remove(\"open\");});\n    return bg;\n  }\n  // Abre a lista de PPSS pra vincular a UMA restri\u00e7\u00e3o espec\u00edfica (lineIdx = posi\u00e7\u00e3o da linha\n  // dentro da c\u00e9lula Restri\u00e7\u00e3o, pareada com a mesma posi\u00e7\u00e3o na c\u00e9lula Prazo).\n  function navOpenPpssPicker(ship,lineIdx){\n    lineIdx=lineIdx||0;\n    var lines=navSplitLines(ship.restricao);\n    var restrTxt=lines[lineIdx]!==undefined?lines[lineIdx]:(ship.restricao||\"\u2014\");\n    var bg=navEnsureModal(\"nvppssBg\",\"Vincular restri\u00e7\u00e3o a um PPSS\");\n    var body=bg.querySelector(\".mbody\");\n    var shipN=normNm(ship.nome);\n    var list=navPpssCache.slice().sort(function(a,b){\n      var am=shipN&&normNm(a.navio).indexOf(shipN)>=0?0:1;\n      var bm=shipN&&normNm(b.navio).indexOf(shipN)>=0?0:1;\n      return am-bm;\n    });\n    var links=ship.ppssLinks||{};\n    var cur=links[lineIdx]||\"\";\n    var head='<div style=\"font-size:12px;color:var(--text2);margin-bottom:10px\"><b>'+esc(ship.nome||\"\u2014\")+'</b> \u2014 restri\u00e7\u00e3o'+(lines.length>1?(\" [\"+(lineIdx+1)+\"/\"+lines.length+\"]\"):\"\")+': <i>'+esc(restrTxt)+'</i></div>';\n    var items=list.length?list.map(function(p){\n      var match=shipN&&normNm(p.navio).indexOf(shipN)>=0;\n      return '<div class=\"ps-item\" data-pid=\"'+p.id+'\" style=\"'+(p.id===cur?\"box-shadow:0 0 0 2px var(--c-blue) i   return '<div class=\"ps-item\" data-id=\"'+s.id+'\">'+\n        '<div class=\"ps-main\"><div class=\"ps-num\">'+esc(s.nome||\"\u2014\")+'</div>'+\n        '<div class=\"ps-meta\">'+n+' per\u00edodo(s) lan\u00e7ado(s)</div></div>'+\n      '</div>';\n    }).join(\"\"):'<div class=\"spot-empty\">Nenhum per\u00edodo retroativo lan\u00e7ado ainda.</div>';\n    body.querySelectorAll(\".ps-item\").forEach(function(el){\n      el.onclick=function(){bg.classList.remove(\"open\");var ship=navFindShip(el.dataset.id);if(ship)navOpenPeriodsList(ship);};\n    });\n    bg.classList.add(\"open\");\n  }\n  function navOpenPeriodsList(ship){\n    var bg=navEnsureModal(\"nvPeriodsBg\",\"Per\u00edodos lan\u00e7ados \u2014 \"+(ship.nome||\"\u2014\"));\n    var body=bg.querySelector(\".mbody\");\n    var entries=(ship.condefHist||[]).filter(function(h){return h.retroativo;}).sort(function(a,b){return a.vigencia<b.vigencia?1:-1;});\n    body.innerHTML=entries.length?entries.map(function(h){\n      return '<div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--border);border-radius:var(--r-md);padding:9px 12px;margin-bottom:8px\">'+\n        '<div><b>'+esc(NAV_ST_LABELS[h.condicaoAnterior]||h.condicaoAnterior||\"\u2014\")+'</b><br>'+\n        '<span style=\"font-size:11px;color:var(--text3)\">'+navFmtBR(h.vigencia)+(h.fim?(\" a \"+navFmtBR(h.fim)):\" (sem data de retorno)\")+(h.condicaoFinal?(\" \u00b7 retorno: \"+(NAV_ST_LABELS[h.condicaoFinal]||h.condicaoFinal)):\"\")+(h.obs?(\" \u00b7 \"+esc(h.obs)):\"\")+'</span></div>'+\n        '<button type=\"button\" class=\"brestore\" data-id=\"'+h.id+'\">Editar</button>'+\n      '</div>';\n    }).join(\"\"):'<div class=\"spot-empty\">Nenhum per\u00edodo retroativo lan\u00e7ado para este navio.</div>';\n    body.querySelectorAll(\"button[data-id]\").forEach(function(b){\n      b.onclick=function(){\n        bg.classList.remove(\"open\");\n        var entry=(ship.condefHist||[]).find(function(h){return h.id===b.dataset.id;});\n        if(entry)navOpenAltForm(ship,entry);\n      };\n    });\n    bg.classList.add(\"open\");\n  }\n  // Passo 1: escolhe se a altera\u00e7\u00e3o \u00e9 NOVA (a partir de hoje, atualiza o CONDEF atual da tabela)\n  // ou RETROATIVA (um per\u00edodo j\u00e1 ocorrido, s\u00f3 entra no hist\u00f3rico/timeline). Ao editar um per\u00edodo\n  // j\u00e1 lan\u00e7ado o tipo j\u00e1 \u00e9 conhecido (editEntry.retroativo), ent\u00e3o esse passo \u00e9 pulado.\n  function navOpenAltTipoPicker(ship){\n    var bg=navEnsureModal(\"nvAltTipoBg\",\"Inserir altera\u00e7\u00e3o \u2014 \"+(ship.nome||\"\u2014\"));\n    var body=bg.querySelector(\".mbody\");\n    body.innerHTML=\n      '<div style=\"display:flex;flex-direction:column;gap:10px\">'+\n        '<button type=\"button\" class=\"ps-item\" id=\"nva_tipo_nova\" style=\"text-align:left;cursor:pointer\">'+\n          '<div class=\"ps-main\"><div class=\"ps-num\">Nova altera\u00e7\u00e3o</div>'+\n          '<div class=\"ps-meta\">A CONDEF muda a partir de hoje (ou de uma data futura) \u2014 atualiza a tabela.</div></div>'+\n        '</button>'+\n        '<button type=\"button\" class=\"ps-item\" id=\"nva_tipo_retro\" style=\"text-align:left;cursor:pointer\">'+\n          '<div class=\"ps-main\"><div class=\"ps-num\">Altera\u00e7\u00e3o retroativa</div>'+\n          '<div class=\"ps-meta\">Um per\u00edodo j\u00e1 ocorrido (in\u00edcio e retorno no passado) \u2014 s\u00f3 entra na Timeline e no Relat\u00f3rio.</div></div>'+\n        '</button>'+\n      '</div>';\n    document.getElementById(\"nva_tipo_nova\").onclick=function(){bg.classList.remove(\"open\");navOpenAltForm(ship,null,\"nova\");};\n    document.getElementById(\"nva_tipo_retro\").onclick=function(){bg.classList.remove(\"open\");navOpenAltForm(ship,null,\"retroativo\");};\n    bg.classList.add(\"open\");\n  }\n  function navOpenAltForm(ship,editEntry,tipo){\n    var isEdit=!!editEntry;\n    tipo=editEntry?(editEntry.retroativo?\"retroativo\":\"nova\"):tipo;\n    var isRetro=tipo===\"retroativo\";\n    var bg=navEnsureModal(\"nvAltFormBg\",(isEdit?\"Editar per\u00edodo \u2014 \":(isRetro?\"Altera\u00e7\u00e3o retroativa \u2014 \":\"Nova altera\u00e7\u00e3o \u2014 \"))+(ship.nome||\"\u2014\"));\n    var body=bg.querySelector(\".mbody\");\n    var todayStr=navDstr(TODAY);\n    var fields=isRetro?(\n        '<div class=\"fld\"><label>Data de in\u00edcio</label><input type=\"date\" id=\"nva_vigencia\" value=\"'+(editEntry?editEntry.vigencia:\"\")+'\"></div>'+\n        '<div class=\"fld\"><label>Data de retorno</label><input type=\"date\" id=\"nva_fim\" value=\"'+(editEntry?(editEntry.fim||\"\"):\"\")+'\"></div>'+\n        '<div class=\"fld\"><label>Condi\u00e7\u00e3o anterior (durante o per\u00edodo)</label><select id=\"nva_condicaoAnterior\"><option value=\"\">\u2014</option>'+\n          [\"P\",\"PO\",\"IO\",\"IM\"].map(function(k){return '<option value=\"'+k+'\"'+(editEntry&&editEntry.condicaoAnterior===k?\" selected\":\"\")+'>'+esc(NAV_ST_LABELS[k])+'</option>';}).join(\"\")+\n        '</select></div>'+\n        '<div class=\"fld\"><label>Condi\u00e7\u00e3o final (ap\u00f3s o retorno)</label><select id=\"nva_condicaoFinal\"><option value=\"\">\u2014</option>'+\n          [\"P\",\"PO\",\"IO\",\"IM\"].map(function(k){return '<option value=\"'+k+'\"'+(editEntry&&editEntry.condicaoFinal===k?\" selected\":\"\")+'>'+esc(NAV_ST_LABELS[k])+'</option>';}).join(\"\")+\n        '</select></div>'+\n        '<div class=\"fld full\" style=\"font-size:10.5px;color:var(--text3)\">A condi\u00e7\u00e3o anterior vale a partir da pr\u00f3pria data de in\u00edcio; a condi\u00e7\u00e3o final vale a partir da pr\u00f3pria data de retorno e permanece at\u00e9 uma altera\u00e7\u00e3o mais recente.</div>'\n      ):(\n        '<div class=\"fld\"><label>Nova condi\u00e7\u00e3o CONDEF</label><select id=\"nva_condef\"><option value=\"\">Manter atual</option>'+\n          [\"P\",\"PO\",\"IO\",\"IM\"].map(function(k){return '<option value=\"'+k+'\"'+(editEntry&&editEntry.condefDepois===k?\" selected\":\"\")+'>'+esc(NAV_ST_LABELS[k])+'</option>';}).join(\"\")+\n        '</select></div>'+\n        '<div class=\"fld\"><label>Data de in\u00edcio</label><input type=\"date\" id=\"nva_vigencia\" value=\"'+(editEntry?editEntry.vigencia:todayStr)+'\"></div>'+\n        '<div class=\"fld full\" style=\"font-size:10.5px;color:var(--text3)\">A nova condi\u00e7\u00e3o j\u00e1 vale a partir da pr\u00f3pria data de in\u00edcio informada.</div>'\n      );\n    body.innerHTML=\n      '<div style=\"font-size:12px;color:var(--text2);margin-bottom:10px\">Embarca\u00e7\u00e3o: <b>'+esc(ship.nome||\"\u2014\")+'</b> \u00b7 CONDEF atual: <b>'+esc(ship.condef||\"\u2014\")+'</b></div>'+\n      '<div class=\"mgrid\">'+fields+\n        '<div class=\"fld full\"><label>Nova restri\u00e7\u00e3o (opcional)</label><input id=\"nva_restricao\" placeholder=\"Ex.: 200/931\" value=\"'+esc(editEntry&&editEntry.restricaoAdicionada!==\"\u2014\"?editEntry.restricaoAdicionada:\"\")+'\"></div>'+\n        '<div class=\"fld\"><label>MSG *</label><input id=\"nva_msg\" placeholder=\"Ex.: P031423Z/JUL/2026\" value=\"'+esc(editEntry?editEntry.msgDepois:\"\")+'\"></div>'+\n        '<div class=\"fld\"><label>Prazo *</label><input type=\"date\" id=\"nva_prazo\" value=\"'+(editEntry?editEntry.prazo:\"\")+'\"></div>'+\n        '<div class=\"fld full\"><label>Observa\u00e7\u00e3o (hist\u00f3rico)</label><input id=\"nva_obs\" placeholder=\"Opcional\" value=\"'+esc(editEntry?editEntry.obs:\"\")+'\"></div>'+\n      '</div>'+\n      '<div id=\"nva_err\" class=\"ferias-msg warn\" style=\"display:none;margin-top:10px\"></div>'+\n      '<div style=\"display:flex;justify-content:'+(isEdit?\"space-between\":\"flex-end\")+';gap:8px;margin-top:14px\">'+\n        (isEdit?'<button class=\"brestore danger\" id=\"nva_del\">Excluir per\u00edodo</button>':'')+\n        '<span style=\"display:flex;gap:8px\"><button class=\"bcancel\" id=\"nva_cancel\">Cancelar</button><button class=\"bsave\" id=\"nva_save\">Salvar</button></span>'+\n      '</div>';\n    document.getElementById(\"nva_cancel\").onclick=function(){bg.classList.remove(\"open\");};\n    document.getElementById(\"nva_save\").onclick=function(){navSaveAlteracao(ship,bg,editEntry,tipo);};\n    if(isEdit)document.getElementById(\"nva_del\").onclick=function(){navDeleteAlteracao(ship,editEntry,bg);};\n    bg.classList.add(\"open\");\n  }\n  async function navSaveAlteracao(ship,bg,editEntry,tipo){\n    tipo=editEntry?(editEntry.retroativo?\"retroativo\":\"nova\"):tipo;\n    var isRetro=tipo===\"retroativo\";\n    var msg=(document.getElementById(\"nva_msg\").value||\"\").trim();\n    var prazo=document.getElementById(\"nva_prazo\").value||\"\";\n    var errEl=document.getElementById(\"nva_err\");\n    var vigencia=document.getElementById(\"nva_vigencia\").value||\"\";\n    if(!msg||!prazo||!vigencia){\n      errEl.textContent=\"Preencha Data de in\u00edcio, MSG e Prazo \u2014 campos obrigat\u00f3rios para salvar a altera\u00e7\u00e3o.\";\n      errEl.style.display=\"block\";\n      return;\n    }\n    var fim=isRetro?(document.getElementById(\"nva_fim\").value||\"\"):\"\";\n    var novaCondef=isRetro?\"\":(document.getElementById(\"nva_condef\").value||\"\");\n    var condicaoAnterior=isRetro?(document.getElementById(\"nva_condicaoAnterior\").value||\"\"):\"\";\n    var condicaoFinal=isRetro?(document.getElementById(\"nva_condicaoFinal\").value||\"\"):\"\";\n    if(isRetro&&fim&&fim<vigencia){\n      errEl.textContent=\"A data de retorno n\u00e3o pode ser anterior \u00e0 data de in\u00edcio.\";\n      errEl.style.display=\"block\";\n      return;\n    }\n    errEl.style.display=\"none\";\n    var restricaoTxt=(document.getElementById(\"nva_restricao\").value||\"\").trim();\n    var obsTxt=(document.getElementById(\"nva_obs\").value||\"\").trim();\n    ship.condefHist=ship.condefHist||[];\n    ship.stHist=ship.stHist||[];\n    if(editEntry){\n      // Edi\u00e7\u00e3o de per\u00edodo j\u00e1 lan\u00e7ado: some com os lan\u00e7amentos antigos na timeline (stHist com\n      // esse srcId) antes de recalcular \u2014 nunca mexe nos campos atuais da tabela quando retroativo\n      // (o per\u00edodo, por defini\u00e7\u00e3o, j\u00e1 \u00e9 passado).\n      ship.stHist=ship.stHist.filter(function(h){return h.srcId!==editEntry.id;});\n      if(isRetro?(condicaoAnterior||condicaoFinal):novaCondef)navClearStHistRange(ship,vigencia,isRetro?fim:null);\n      editEntry.vigencia=vigencia;editEntry.fim=fim||\"\";\n      editEntry.condefDepois=novaCondef||editEntry.condefAntes;\n      editEntry.condicaoAnterior=condicaoAnterior;editEntry.condicaoFinal=condicaoFinal;\n      editEntry.msgDepois=msg;editEntry.restricaoAdicionada=restricaoTxt||\"\u2014\";editEntry.prazo=prazo;editEntry.obs=obsTxt;\n      if(isRetro){\n        if(condicaoAnterior)ship.stHist.push({st:condicaoAnterior,ts:new Date(vigencia+\"T00:00:00\").toISOString(),srcId:editEntry.id});\n        if(fim&&condicaoFinal)ship.stHist.push({st:condicaoFinal,ts:new Date(fim+\"T00:00:00\").toISOString(),srcId:editEntry.id});\n      }else if(novaCondef){\n        ship.stHist.push({st:novaCondef,ts:new Date(vigencia+\"T00:00:00\").toISOString(),srcId:editEntry.id});\n      }\n      ship.stHist.sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});\n      navSaveShips();\n      await pushKV(\"navPush\",NAVIOS_KEY,navShips);\n      auditPushOne(\"navios_table\",ship.id,\"per\u00edodo retroativo editado (vig\u00eancia \"+navFmtBR(vigencia)+(fim?(\" a \"+navFmtBR(fim)):\"\")+\")\");\n      touchLastEdit(\"navios_table\");\n      bg.classList.remove(\"open\");\n      toast(\"\u2713 Per\u00edodo atualizado\",\"ok\");\n      renderNavios();renderNaviosCards();\n      return;\n    }\n    var entry={\n      id:genUid(\"cdh\"),ts:nowISO(),vigencia:vigencia,fim:fim||\"\",\n      condefAntes:ship.condef||\"\",condefDepois:novaCondef||(ship.condef||\"\"),\n      condicaoAnterior:condicaoAnterior,condicaoFinal:condicaoFinal,\n      msgAntes:ship.msg||\"\",msgDepois:msg,\n      restricaoAdicionada:restricaoTxt||\"\u2014\",prazo:prazo,\n      obs:obsTxt,retroativo:isRetro\n    };\n    ship.condefHist.push(entry);\n    if(isRetro?(condicaoAnterior||condicaoFinal):novaCondef)navClearStHistRange(ship,vigencia,isRetro?fim:null);\n    if(!isRetro){\n      // Nova altera\u00e7\u00e3o: j\u00e1 entra em vigor na pr\u00f3pria data de in\u00edcio (n\u00e3o no dia seguinte) e\n      // atualiza os campos atuais da tabela.\n      if(novaCondef&&novaCondef!==ship.condef)ship.stHist.push({st:novaCondef,ts:new Date(vigencia+\"T00:00:00\").toISOString(),srcId:entry.id});\n      if(novaCondef)ship.condef=novaCondef;\n      ship.msg=msg;\n      var prazoFmt=navFmtBR(prazo);\n      ship.restricao=ship.restricao?ship.restricao+\"\\n\"+(restricaoTxt||\"\u2014\"):(restricaoTxt||\"\u2014\");\n      ship.previsao=ship.previsao?ship.previsao+\"\\n\"+prazoFmt:prazoFmt;\n    }else{\n      // Retroativo: registra o per\u00edodo direto na linha do tempo de status (stHist), sem tocar no\n      // estado atual \u2014 assim a Timeline e o Relat\u00f3rio de Operacionalidade passam a contar esses\n      // dias. Condi\u00e7\u00e3o anterior vale a partir da pr\u00f3pria data de in\u00edcio (dia inicial j\u00e1 com a nova\n      // condi\u00e7\u00e3o, n\u00e3o o dia seguinte); condi\u00e7\u00e3o final vale a partir da pr\u00f3pria data de retorno e\n      // permanece at\u00e9 a pr\u00f3xima altera\u00e7\u00e3o mais recente. srcId liga essas entradas ao per\u00edodo em\n      // condefHist, pra permitir editar/excluir depois.\n      if(condicaoAnterior)ship.stHist.push({st:condicaoAnterior,ts:new Date(vigencia+\"T00:00:00\").toISOString(),srcId:entry.id});\n      if(fim&&condicaoFinal)ship.stHist.push({st:condicaoFinal,ts:new Date(fim+\"T00:00:00\").toISOString(),srcId:entry.id});\n      ship.stHist.sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});\n    }\n    navSaveShips();\n    await pushKV(\"navPush\",NAVIOS_KEY,navShips);\n    auditPushOne(\"navios_table\",ship.id,isRetro?(\"altera\u00e7\u00e3o retroativa registrada (vig\u00eancia \"+navFmtBR(vigencia)+(fim?(\" a \"+navFmtBR(fim)):\"\")+\")\"):\"altera\u00e7\u00e3o CONDEF inserida\");\n    touchLastEdit(\"navios_table\");\n    bg.classList.remove(\"open\");\n    toast(isRetro?\"\ud83d\udcdc Altera\u00e7\u00e3o retroativa registrada no hist\u00f3rico e na timeline\":\"\u2713 Altera\u00e7\u00e3o aplicada e registrada no hist\u00f3rico\",\"ok\");\n    renderNavios();renderNaviosCards();\n  }\n  async function navDeleteAlteracao(ship,entry,bg){\n    if(!confirm(\"Excluir este per\u00edodo lan\u00e7ado? Os registros correspondentes na Timeline de Status tamb\u00e9m ser\u00e3o removidos.\"))return;\n    ship.condefHist=(ship.condefHist||[]).filter(function(h){return h.id!==entry.id;});\n    ship.stHist=(ship.stHist||[]).filter(function(h){return h.srcId!==entry.id;});\n    navSaveShips();\n    await pushKV(\"navPush\",NAVIOS_KEY,navShips);\n    auditPushOne(\"navios_table\",ship.id,\"per\u00edodo retroativo exclu\u00eddo (vig\u00eancia \"+navFmtBR(entry.vigencia)+\")\");\n    touchLastEdit(\"navios_table\");\n    bg.classList.remove(\"open\");\n    toast(\"\ud83d\uddd1 Per\u00edodo exclu\u00eddo\",\"ok\");\n    renderNavios();renderNaviosCards();\n  }\n  /* \u2500\u2500 Tabela-resumo: cada restri\u00e7\u00e3o (linha) vinculada a um PPSS, com dados do pedido \u2500\u2500 */\n  function renderNaviosPpssLinkTable(){\n    var tbody=document.getElementById(\"nv_ppsslink_tbody\");\n    if(!tbody)return;\n    var rows=[];\n    navShips.forEach(function(s){\n      var lines=navSplitLines(s.restricao),prazos=navSplitLines(s.previsao),links=s.ppssLinks||{};\n      lines.forEach(function(ln,i){\n        var pid=links[i];\n        if(!pid)return;\n        rows.push({navio:s.nome,restricao:ln,prazo:prazos[i]||\"\u2014\",p:navPpssById(pid)});\n      });\n    });\n    if(!rows.length){tbody.innerHTML='<tr><td colspan=\"6\" style=\"text-align:center;color:var(--text3);font-style:italic\">Nenhuma restri\u00e7\u00e3o vinculada a PPSS ainda.</td></tr>';return;}\n    tbody.innerHTML=rows.map(function(r){\n      return '<tr><td>'+esc(r.navio||\"\u2014\")+'</td><td>'+esc(r.restricao||\"\u2014\")+'</td><td>'+esc(r.prazo||\"\u2014\")+'</td>'+\n        '<td>'+esc(r.p?(r.p.numero||\"\u2014\"):\"(n\u00e3o encontrado)\")+'</td>'+\n        '<td>'+esc(r.p?(r.p.situacao||\"\u2014\"):\"\u2014\")+'</td>'+\n        '<td>'+(r.p?fmtBRL(moneyVal(r.p.orcamento)):\"\u2014\")+'</td></tr>';\n    }).join(\"\");\n  }\n  // Comiss\u00f5es: tabela edit\u00e1vel, independente das embarca\u00e7\u00f5es \u2014 linhas s\u00f3 existem quando o\n  // usu\u00e1rio lan\u00e7a uma comiss\u00e3o em curso/prevista (n\u00e3o \u00e9 pr\u00e9-preenchida com os nomes dos meios).\n  // Usa o mesmo padr\u00e3o bindDataTable das demais tabelas do app: linhas com arrastar/incluir/\n  // excluir, colunas com renomear/incluir/excluir/reordenar, e coluna A\u00e7\u00f5es vis\u00edvel s\u00f3 na edi\u00e7\u00e3o.\n  var NAVIOS_COMISSAO_KEY=\"aa_navios_comissoes_v1\";\n  var NAVIOS_COMISSAO_COLS_KEY=\"aa_navios_comissao_cols_v1\";\n  var NAV_COMISSAO_STATUS=[\"Conclu\u00edda\",\"Prevista\",\"Em andamento\",\"A ser adiada\",\"Cancelada\"];\n  var NAV_COMISSAO_STATUS_CLS={\"Conclu\u00edda\":\"comissao-done\",\"Cancelada\":\"comissao-cancelada\",\"A ser adiada\":\"comissao-adiada\",\"Em andamento\":\"comissao-andamento\",\"Prevista\":\"comissao-prevista\"};\n  var NAV_COMISSAO_STATUS_COLOR={\"Conclu\u00edda\":\"var(--c-teal)\",\"Cancelada\":\"var(--c-red)\",\"A ser adiada\":\"var(--c-amber)\",\"Em andamento\":\"var(--c-blue)\",\"Prevista\":\"#c9b21a\"};\n  function navComissaoColsDefault(){\n    return [\n      {key:\"meio\",title:\"Meio\"},{key:\"comissao\",title:\"Comiss\u00e3o\"},\n      {key:\"inicio\",title:\"In\u00edcio\",type:\"date\"},{key:\"fim\",title:\"Fim\",type:\"date\"},\n      {key:\"localizacao\",title:\"Localiza\u nv-editbtn add-year\" id=\"'+idPrefix+'_addyear\">+ Ano</button>':'')+\n      '<button type=\"button\" class=\"nv-editbtn\" id=\"'+idPrefix+'_refresh\" title=\"Recarregar com os lan\u00e7amentos mais recentes\">\ud83d\udd04 Atualizar</button>'+\n    '</div>';\n  }\n  function navBindYearControls(idPrefix){\n    var prev=document.getElementById(idPrefix+\"_prev\"),next=document.getElementById(idPrefix+\"_next\"),\n      add=document.getElementById(idPrefix+\"_addyear\"),refresh=document.getElementById(idPrefix+\"_refresh\");\n    if(prev)prev.onclick=function(){if(navYear>NAV_YEAR_MIN)navSetYear(navYear-1);};\n    if(next)next.onclick=function(){if(navYear<Math.max(navYear,CUR_YEAR))navSetYear(navYear+1);};\n    if(add)add.onclick=function(){navSetYear(navYear+1);};\n    if(refresh)refresh.onclick=function(){navRenderTimeline();navRenderOperReport();toast(\"\u2713 Timeline e relat\u00f3rio atualizados\",\"ok\");};\n  }\n  // Resolve a entrada de condefHist correspondente a um segmento da timeline, pra abrir o\n  // formul\u00e1rio de edi\u00e7\u00e3o ao clicar. Segmentos retroativos carregam srcId (gravado no stHist);\n  // o segmento \"live\" (condi\u00e7\u00e3o atual, sem srcId) cai na \u00faltima entrada n\u00e3o retroativa lan\u00e7ada.\n  function navEntryForSeg(ship,seg,isLive){\n    if(seg.srcId)return(ship.condefHist||[]).find(function(h){return h.id===seg.srcId;})||null;\n    if(isLive){\n      var novas=(ship.condefHist||[]).filter(function(h){return !h.retroativo;});\n      return novas.length?novas[novas.length-1]:null;\n    }\n    return null;\n  }\n  function navRenderTimeline(){\n    var el=document.getElementById(\"nv_tl_sec\");\n    if(!el)return;\n    var y=navYear,totalMs=new Date(y+1,0,1)-new Date(y,0,1);\n    var legend='<div class=\"nv-tl-legend\">'+Object.keys(NAV_ST_COLORS).map(function(k){return'<span><span class=\"nv-tl-dot\" style=\"background:'+NAV_ST_COLORS[k]+'\"></span>'+NAV_ST_LABELS[k]+'</span>';}).join(\"\")+'<span><span class=\"nv-t
